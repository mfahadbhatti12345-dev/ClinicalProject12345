                        </div>
                    </div>

                    {/* Patient Info Grid */}
                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-6 mb-8 shadow-sm">
                        <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <User className="w-4 h-4"/> Clinical Demographics
                        </h2>
                        <div className="grid grid-cols-2 gap-y-4 gap-x-12">
                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                <span className="text-slate-500 text-sm font-medium">Age / Sex</span>
                                <span className="font-bold text-slate-900">{patient.age} Years / {patient.gender}</span>
                            </div>
                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                <span className="text-slate-500 text-sm font-medium">Weight</span>
                                <span className="font-bold text-slate-900">{patient.weight} kg</span>
                            </div>
                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                <span className="text-slate-500 text-sm font-medium">Est. CrCl (Renal)</span>
                                <span className={`font-bold ${patient.crcl && patient.crcl < 50 ? 'text-red-600' : 'text-slate-900'}`}>{patient.crcl || 'N/A'} mL/min</span>
                            </div>
                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                <span className="text-slate-500 text-sm font-medium">Known Pathologies</span>
                                <span className="font-bold text-slate-900 text-right">{patient.conditions}</span>
                            </div>
                        </div>
                    </div>

                    {/* Medications Table */}
                    <div className="mb-10">
                        <h2 className="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2 border-b pb-2">
                            <Pill className="w-5 h-5 text-indigo-600"/> Pharmacotherapy Regimen
                        </h2>
                        <table className="w-full text-sm text-left border rounded-lg overflow-hidden shadow-sm">
                            <thead className="bg-slate-100 text-slate-700 font-semibold border-b">
                            <tr>
                                <th className="p-3 border-r w-1/3">Drug Name</th>
                                <th className="p-3 border-r">Dosage</th>
                                <th className="p-3 border-r">Frequency</th>
                                <th className="p-3">Route</th>
                            </tr>
                            </thead>
                            <tbody className="divide-y">
                            {drugs.map((d, i) => (
                                <tr key={i} className="even:bg-slate-50">
                                <td className="p-3 font-bold text-slate-800 border-r">{d.name}</td>
                                <td className="p-3 border-r">{d.dose}</td>
                                <td className="p-3 border-r">{d.freq}</td>
                                <td className="p-3">{d.route}</td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Analysis Section */}
                    <div className="mb-8">
                        <h2 className="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2 border-b pb-2">
                            <AlertTriangle className="w-5 h-5 text-indigo-600"/> Interaction Risk Analysis
                        </h2>
                        {interactions.length > 0 ? (
                            <div className="space-y-6">
                            {interactions.map((item, idx) => (
                                <div key={idx} className="interaction-card border border-slate-200 rounded-lg p-5 shadow-sm bg-white relative overflow-hidden">
                                    <div className={`absolute top-0 left-0 w-2 h-full`} style={{ backgroundColor: SEVERITY_HEX[item.severity] || '#ccc' }}></div>
                                    <div className="pl-4">
                                        <div className="flex justify-between items-start mb-3">
                                            <h3 className="font-bold text-xl text-slate-900">{item.pair}</h3>
                                            <div className={`px-3 py-1 rounded text-xs font-bold border uppercase tracking-wide flex items-center gap-1`} style={{ color: SEVERITY_HEX[item.severity], borderColor: SEVERITY_HEX[item.severity] }}>
                                                {item.severity === 'Major' && <AlertTriangle className="w-3 h-3"/>}
                                                {item.severity} Risk
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-8 text-sm mb-4">
                                            <div>
                                                <span className="font-bold block text-slate-400 text-xs uppercase mb-1">Pharmacological Mechanism</span> 
                                                <span className="text-slate-800 leading-snug">{item.mechanism}</span>
                                            </div>
                                            <div>
                                                <span className="font-bold block text-slate-400 text-xs uppercase mb-1">Projected Clinical Effect</span> 
                                                <span className="text-slate-800 leading-snug">{item.effect}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-slate-50 p-4 rounded-md border border-slate-100 mb-4">
                                            <span className="font-bold text-indigo-700 block text-xs mb-1 uppercase flex items-center gap-1">
                                                <CheckCircle className="w-3 h-3"/> Clinical Recommendation
                                            </span>
                                            <p className="text-slate-900 font-medium text-sm">{item.recommendation}</p>
                                            
                                            {item.dose_adjustment && (
                                                <div className="mt-3 pt-3 border-t border-slate-200 text-sm text-slate-600 flex items-start gap-2">
                                                    <Activity className="w-4 h-4 text-indigo-500 mt-0.5"/> 
                                                    <span><strong className="text-slate-800">Dose Adjustment:</strong> {item.dose_adjustment}</span>
                                                </div>
                                            )}
                                        </div>

                                        {/* Detailed Math Formula Box */}
                                        {item.formula && (
                                            <div className="mb-4 p-4 bg-slate-800 text-slate-200 rounded-md border border-slate-700 text-xs font-mono whitespace-pre-wrap shadow-inner">
                                                <strong className="block text-indigo-300 mb-2 uppercase tracking-wider flex items-center gap-2">
                                                    <Calculator className="w-3 h-3"/> Adjustment Mathematics
                                                </strong>
                                                {item.formula}
                                            </div>
                                        )}
                                        
                                        {/* Render References as Links */}
                                        <div className="mt-4 flex flex-wrap gap-3 justify-end text-xs">
                                            <span className="text-slate-400 italic self-center">Evidence:</span>
                                            {item.references && item.references.map((ref, rIdx) => {
                                                const title = typeof ref === 'string' ? ref : ref.title;
                                                const url = `https://scholar.google.com/scholar?q=${encodeURIComponent(title)}`;
                                                
                                                return (
                                                    <a key={rIdx} href={url} target="_blank" className="flex items-center gap-1 bg-slate-100 hover:bg-indigo-50 text-indigo-600 px-2 py-1 rounded border border-slate-200 transition-colors">
                                                        {title} <ExternalLink className="w-3 h-3"/>
                                                    </a>
                                                );
                                            })}
                                        </div>
                                        
                                        {/* Specific Search Links for this Pair */}
                                        <ClinicalSearchLinks pair={item.pair} />
                                    </div>
                                </div>
                            ))}
                            </div>
                        ) : (
                            <p className="text-slate-500 italic p-6 border rounded-lg text-center bg-slate-50">No clinically significant interactions detected.</p>
                        )}
                    </div>

                    {/* Disposition & Outcome (Page break if needed) */}
                    <div className="mb-8 break-inside-avoid bg-indigo-50 border border-indigo-100 p-5 rounded-lg shadow-sm">
                        <h2 className="text-sm font-bold text-indigo-800 uppercase mb-4 border-b border-indigo-200 pb-2">Final Clinical Disposition</h2>
                        <div className="grid grid-cols-2 gap-8">
                            <div>
                                <span className="text-xs text-indigo-400 block uppercase font-bold mb-1">Intervention Taken</span>
                                <span className="font-bold text-indigo-900 text-lg">{patient.intervention}</span>
                            </div>
                            <div>
                                <span className="text-xs text-indigo-400 block uppercase font-bold mb-1">Outcome Status</span>
                                <span className="font-bold text-indigo-900 text-lg">{patient.outcome}</span>
                            </div>
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <div className="border-t-4 border-slate-800 pt-8 mt-12 flex justify-between items-end break-inside-avoid">
                        <div className="text-xs text-slate-400 max-w-md">
                            <p className="font-bold text-slate-900">Generated by ClinIQ AI-Assisted Platform</p>
                            <p className="mt-1">This report is intended for use by healthcare professionals only. The interactions and recommendations are based on available pharmacological data and AI synthesis but must be verified against official institutional protocols.</p>
                        </div>
                        <div className="text-center">
                            <div className="h-16 w-64 border-b border-slate-400 mb-2"></div>
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Clinician Signature / Date</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- Login Component ---
        const LoginScreen = ({ onLogin }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pin === '12345') {
                    onLogin();
                } else {
                    setError('Invalid Security Code');
                }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Lock className="w-8 h-8 text-indigo-600" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800">ClinIQ Secure Access</h2>
                            <p className="text-slate-500 text-sm mt-1">Enter your clinical ID to continue</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <input 
                                    type="password" 
                                    value={pin}
                                    onChange={(e) => setPin(e.target.value)}
                                    className="w-full text-center text-3xl tracking-widest p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono"
                                    placeholder="•••••"
                                    maxLength={5}
                                    autoFocus
                                />
                            </div>
                            {error && <p className="text-red-500 text-center text-sm">{error}</p>}
                            <button type="submit" className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                                Authenticate
                            </button>
                            <p className="text-xs text-slate-400 text-center mt-4">Authorized Personnel Only. <br/>Default Access: 12345</p>
                        </form>
                    </div>
                </div>
            );
        };

        // --- Main Application ---
        function ClinIQPlatform() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [activeTab, setActiveTab] = useState('intake');
          const [loading, setLoading] = useState(false);
          const [notification, setNotification] = useState(null);
          const [geminiKey, setGeminiKey] = useState('');
          const [showSettings, setShowSettings] = useState(false);
          const [printData, setPrintData] = useState(null); // State to handle print modal
          
          const generateId = () => `PT-${Math.random().toString(36).substr(2, 6).toUpperCase()}-${new Date().getFullYear()}`;

          // INITIAL STATE BLANK AS REQUESTED
          const [patient, setPatient] = useState({
            id: generateId(),
            age: '',
            gender: 'Male',
            weight: '',
            crcl: '', // Optional
            conditions: '',
            intervention: 'Monitoring Only',
            outcome: 'Stable'
          });

          const [drugs, setDrugs] = useState([
            { id: 1, name: '', dose: '', freq: '', route: 'Oral' } // Blank start
          ]);

          const [interactions, setInteractions] = useState([]);
          const [savedRecords, setSavedRecords] = useState([]); 
          const [chatQuery, setChatQuery] = useState('');
          const [chatHistory, setChatHistory] = useState([
            { role: 'system', text: 'I am your Clinical AI Analyst. I have access to the current patient profile. Ask me about trends, mortality risks, or specific mechanism queries.' }
          ]);

          // --- BOOTSTRAP: Load Records & Fetch API Key ---
          useEffect(() => {
              // 1. Load Local Storage
              try {
                const loaded = JSON.parse(localStorage.getItem('cliniq_records') || '[]');
                setSavedRecords(loaded);
              } catch(e) {
                  console.error("Storage access error", e);
              }

              // 2. Fetch Gemini API Key from Server (Supabase)
              const fetchServerKey = async () => {
                  if (!supabaseClient) return;
                  try {
                      const { data, error } = await supabaseClient
                          .from('app_config')
                          .select('value')
                          .eq('key', 'gemini_api_key')
                          .single();
                      
                      if (data && data.value) {
                          setGeminiKey(data.value);
                          console.log("Gemini API Key loaded from server.");
                      } else {
                          setNotification({ type: 'info', message: 'API Key not found on server. Please configure manually.' });
                          setShowSettings(true);
                      }
                  } catch (err) {
                      console.warn("Could not fetch API key from server. Using manual input.", err);
                  }
              };
              fetchServerKey();
          }, []);

          // Clear notification
          useEffect(() => {
              if (notification) {
                  const timer = setTimeout(() => setNotification(null), 3000);
                  return () => clearTimeout(timer);
              }
          }, [notification]);

          const handlePatientChange = (e) => {
            setPatient({ ...patient, [e.target.name]: e.target.value });
          };

          const addDrug = () => {
            const newId = drugs.length > 0 ? Math.max(...drugs.map(d => d.id)) + 1 : 1;
            setDrugs([...drugs, { id: newId, name: '', dose: '', freq: '', route: 'Oral' }]);
          };

          const updateDrug = (id, field, value) => {
            setDrugs(drugs.map(d => d.id === id ? { ...d, [field]: value } : d));
          };

          const removeDrug = (id) => {
            setDrugs(drugs.filter(d => d.id !== id));
          };

          // --- New Patient Logic ---
          const resetPatient = () => {
            if (confirm("Start a new patient case? Any unsaved data will be lost.")) {
                setPatient({
                    id: generateId(),
                    age: '',
                    gender: 'Male',
                    weight: '',
                    crcl: '',
                    conditions: '',
                    intervention: 'Monitoring Only',
                    outcome: 'Stable'
                });
                setDrugs([{ id: 1, name: '', dose: '', freq: '', route: 'Oral' }]);
                setInteractions([]);
                setChatHistory([{ role: 'system', text: 'I am your Clinical AI Analyst. I have access to the current patient profile. Ask me about trends, mortality risks, or specific mechanism queries.' }]);
                setActiveTab('intake');
                setNotification({ type: 'info', message: 'New Patient Case Started' });
            }
          };

          // --- SAVE LOGIC (Local + Supabase) ---
          const saveToServer = async () => {
              try {
                setLoading(true);
                const payload = {
                    patient_id: patient.id, // Supabase column usually snake_case
                    patientId: patient.id, // Local storage preference
                    timestamp: new Date().toISOString(),
                    demographics: patient,
                    medications: drugs,
                    interactions: interactions,
                    disposition: { intervention: patient.intervention, outcome: patient.outcome }
                };
                
                // 1. Local Storage UPSERT Logic (Prevent Duplicates)
                const existingIndex = savedRecords.findIndex(r => r.patientId === patient.id);
                let updatedRecords = [...savedRecords];
                
                if (existingIndex >= 0) {
                    updatedRecords[existingIndex] = payload;
                    setNotification({ type: 'success', message: `Patient ${patient.id} Updated Locally` });
                } else {
                    updatedRecords.push(payload);
                    setNotification({ type: 'success', message: `Patient ${patient.id} Saved Locally` });
                }
                
                setSavedRecords(updatedRecords);
                localStorage.setItem('cliniq_records', JSON.stringify(updatedRecords));

                // 2. Supabase Logic (If configured)
                if (supabaseClient) {
                    setNotification({ type: 'info', message: 'Syncing to Cloud...' });
                    
                    const { data, error } = await supabaseClient
                        .from('clinical_records')
                        .upsert({ 
                            patient_id: patient.id,
                            demographics: patient,
                            medications: drugs,
                            interactions: interactions,
                            disposition: { intervention: patient.intervention, outcome: patient.outcome },
                            created_at: new Date().toISOString()
                        }, { onConflict: 'patient_id' });

                    if (error) throw error;
                    setNotification({ type: 'success', message: `Synced to Supabase DB!` });
                }

              } catch (e) {
                console.error(e);
                setNotification({ type: 'error', message: 'Error saving data: ' + e.message });
              } finally {
                  setLoading(false);
              }
          };

          const deleteRecord = (id) => {
              if(!confirm("Are you sure you want to delete this record?")) return;
              const updated = savedRecords.filter(r => r.patientId !== id);
              setSavedRecords(updated);
              localStorage.setItem('cliniq_records', JSON.stringify(updated));
              setNotification({ type: 'success', message: 'Record deleted.' });
          }
          
          const loadRecordForEditing = (record) => {
              if(confirm(`Load patient ${record.patientId} into active session? Unsaved changes will be lost.`)) {
                  setPatient(record.demographics);
                  setDrugs(record.medications);
                  setInteractions(record.interactions || []);
                  
                  // Smart Tab Switching: If analysis exists, go there to print/view. Otherwise go to intake.
                  if (record.interactions && record.interactions.length > 0) {
                      setActiveTab('analysis');
                      setNotification({ type: 'success', message: `Loaded: Analysis Data Restored` });
                  } else {
                      setActiveTab('intake');
                      setNotification({ type: 'info', message: `Loaded: Ready for Intake` });
                  }
              }
          }
          
          const openPrintModal = (record = null) => {
              const dataToPrint = record || { patient, drugs, interactions };
              setPrintData(dataToPrint);
          };

          const runClinicalAnalysis = async () => {
            if (!geminiKey) {
                setNotification({ type: 'error', message: 'API Key missing. Please check Settings.' });
                setShowSettings(true);
                return;
            }

            setLoading(true);
            
            const context = `
              Act as a Clinical Pharmacologist using the ClinIQ Protocol.
              Patient: ${patient.age}y ${patient.gender}, Weight: ${patient.weight || 'Unknown'}kg, CrCl: ${patient.crcl || 'Not Provided'}.
              Conditions: ${patient.conditions}.
              Drugs: ${drugs.map(d => `${d.name} (${d.dose}, ${d.freq}, ${d.route})`).join(', ')}.

              TASK:
              1. Identify drug-drug interactions and drug-disease interactions.
              2. For each interaction, assign a Severity: "Major", "Moderate", "Minor", "Monitoring", or "Safe".
              3. Provide a mechanism (PK/PD).
              4. Calculate specific dose adjustments based on the Age (${patient.age}) and Renal Function (${patient.crcl || 'Not Provided'}). If CrCl is not provided, note that adjustment cannot be calculated precisely.
              5. Provide detailed mathematical formulas/logic used for the adjustment in a 'formula' field (e.g. Cockcroft-Gault steps or specific drug clearance equations).
              6. Cite 1-2 credible sources by Title (e.g. "ACC Anticoagulation Guidelines"). DO NOT generate URLs.

              OUTPUT FORMAT: JSON ONLY.
              Structure:
              {
                "interactions": [
                  {
                    "pair": "Drug A + Drug B",
                    "severity": "Major",
                    "mechanism": "...",
                    "effect": "...",
                    "recommendation": "...",
                    "dose_adjustment": "...",
                    "formula": "Step 1: CrCl = ... \nStep 2: ...",
                    "references": ["Title of Source 1", "Title of Source 2"]
                  }
                ],
                "summary_score": 85
              }
            `;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: context }] }],
                  generationConfig: { responseMimeType: "application/json" }
                })
              });

              if (!response.ok) throw new Error('API Request Failed');

              const data = await response.json();
              const result = JSON.parse(data.candidates[0].content.parts[0].text);
              
              setInteractions(result.interactions || []);
              setActiveTab('analysis');
              setNotification({ type: 'success', message: 'Analysis Complete' });
            } catch (error) {
              console.error(error);
              setNotification({ type: 'error', message: 'AI Analysis Failed. Check API Key.' });
              // Fallback for demo
              setInteractions([
                {
                  pair: "System Demo: Warfarin + Amiodarone",
                  severity: "Major",
                  mechanism: "Pharmacokinetic (CYP2C9 Inhibition)",
                  effect: "Significantly increased INR and bleeding risk. Demo Mode Active.",
                  recommendation: "Decrease Warfarin dose by 30-50% upon initiation of Amiodarone.",
                  dose_adjustment: "Target INR 2.0-3.0. Consider reducing Warfarin to 2.5mg.",
                  formula: "1. Calculate baseline weekly Warfarin dose.\n2. Apply 30-50% reduction factor.\n3. Monitor INR every 3-5 days during Amiodarone loading.",
                  references: ["ClinIQ Fallback Protocol", "ACC Anticoagulation Guidelines"]
                }
              ]);
              setActiveTab('analysis');
            }
            setLoading(false);
          };

          const handleAskData = async () => {
            if (!chatQuery.trim()) return;
            if (!geminiKey) {
                setShowSettings(true);
                return;
            }
            
            const newHistory = [...chatHistory, { role: 'user', text: chatQuery }];
            setChatHistory(newHistory);
            setChatQuery('');
            setLoading(true);

            const context = `
              You are the "Ask the Data" module of ClinIQ.
              Current Patient Dataset:
              - Demographics: ${patient.age}y ${patient.gender}, CrCl ${patient.crcl}.
              - Active Meds: ${drugs.map(d => d.name).join(', ')}.
              - Known Interactions: ${JSON.stringify(interactions)}.

              User Query: "${chatQuery}"

              Instructions:
              - Answer strictly based on the provided data.
              - Be concise, professional, and audit-ready.
            `;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
              });
              
              const data = await response.json();
              const answer = data.candidates[0].content.parts[0].text;
              
              setChatHistory([...newHistory, { role: 'ai', text: answer }]);
            } catch (e) {
              setChatHistory([...newHistory, { role: 'ai', text: "System Offline: Unable to query clinical engine." }]);
            }
            setLoading(false);
          };

          const exportData = (format) => {
            if (format === 'csv') {
              let csvContent = "data:text/csv;charset=utf-8,";
              csvContent += "Type,Pair,Severity,Mechanism,Recommendation\n";
              interactions.forEach(i => {
                csvContent += `Interaction,"${i.pair}",${i.severity},"${i.mechanism}","${i.recommendation}"\n`;
              });
              const encodedUri = encodeURI(csvContent);
              const link = document.createElement("a");
              link.setAttribute("href", encodedUri);
              link.setAttribute("download", `clinical_report_${patient.id}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            } else {
                // Trigger modal for print instead of direct window.print()
                openPrintModal();
            }
          };

          // --- Views ---

          const renderIntake = () => (
            <div className="max-w-4xl mx-auto">
              <div className="bg-slate-50 border-l-4 border-indigo-600 p-4 mb-6 rounded-r-lg flex justify-between items-center">
                <div>
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <User className="w-5 h-5" /> Patient Demographics & Regimen
                    </h2>
                    <p className="text-slate-600 text-sm">Enter baseline parameters to initialize the Interaction Engine.</p>
                </div>
                <div className="bg-white px-3 py-1 rounded border shadow-sm">
                    <span className="text-xs text-slate-500 block">Patient ID</span>
                    <span className="font-mono font-bold text-indigo-600">{patient.id}</span>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <QuestionBlock index={0} label="Age & Gender" subLabel="Determines metabolic clearance factors">
                  <div className="flex gap-4">
                    <input type="number" name="age" value={patient.age} onChange={handlePatientChange} className="w-24 p-2 border rounded" placeholder="Age" />
                    <select name="gender" value={patient.gender} onChange={handlePatientChange} className="p-2 border rounded flex-grow">
                      <option>Male</option>
                      <option>Female</option>
                    </select>
                  </div>
                </QuestionBlock>

                <QuestionBlock index={1} label="Clinical Metrics" subLabel="Renal (CrCl) and Hepatic indicators">
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="text-xs text-slate-500">Weight (kg)</label>
                      <input type="number" name="weight" value={patient.weight} onChange={handlePatientChange} className="w-full p-2 border rounded" />
                    </div>
                    <div className="flex-1">
                      <label className="text-xs text-slate-500">Est. CrCl (Optional)</label>
                      <input type="number" name="crcl" value={patient.crcl} onChange={handlePatientChange} className="w-full p-2 border rounded" placeholder="mL/min" />
                    </div>
                  </div>
                </QuestionBlock>

                <div className="col-span-1 md:col-span-2">
                  <QuestionBlock index={2} label="Current Diagnoses" subLabel="ICD-10 Mappings for Contraindication Checks">
                    <input type="text" name="conditions" value={patient.conditions} onChange={handlePatientChange} className="w-full p-2 border rounded" placeholder="e.g. Hypertension, Diabetes Type 2" />
                  </QuestionBlock>
                </div>

                <div className="col-span-1 md:col-span-2">
                  <QuestionBlock index={3} label="Active Pharmacotherapy" subLabel="List all Rx, OTC, and Supplements">
                    <div className="space-y-3">
                      {drugs.map((drug, i) => (
                        <div key={drug.id} className="flex flex-wrap gap-2 items-end bg-slate-50 p-3 rounded border border-slate-200">
                          <div className="w-8 text-center text-slate-400 font-bold">{i+1}</div>
                          <div className="flex-grow min-w-[150px]">
                            <label className="text-xs font-semibold text-slate-500">Drug Name</label>
                            <input type="text" value={drug.name} onChange={(e) => updateDrug(drug.id, 'name', e.target.value)} className="w-full p-1 border rounded bg-white" placeholder="Drug Name" />
                          </div>
                          <div className="w-24">
                            <label className="text-xs font-semibold text-slate-500">Dose</label>
                            <input type="text" value={drug.dose} onChange={(e) => updateDrug(drug.id, 'dose', e.target.value)} className="w-full p-1 border rounded bg-white" placeholder="mg" />
                          </div>
                          <div className="w-24">
                            <label className="text-xs font-semibold text-slate-500">Freq</label>
                            <input type="text" value={drug.freq} onChange={(e) => updateDrug(drug.id, 'freq', e.target.value)} className="w-full p-1 border rounded bg-white" placeholder="QD/BID" />
                          </div>
                          <div className="w-24">
                            <label className="text-xs font-semibold text-slate-500">Route</label>
                            <select value={drug.route} onChange={(e) => updateDrug(drug.id, 'route', e.target.value)} className="w-full p-1 border rounded bg-white">
                                <option value="Oral">Oral</option>
                                <option value="IV">IV</option>
                                <option value="IM">IM</option>
                                <option value="SC">SubQ</option>
                                <option value="Inhaled">Inhaled</option>
                                <option value="Topical">Topical</option>
                                <option value="Rectal">Rectal</option>
                            </select>
                          </div>
                          <button onClick={() => removeDrug(drug.id)} className="text-red-500 hover:text-red-700 p-2"><XCircle className="w-5 h-5"/></button>
                        </div>
                      ))}
                      <button onClick={addDrug} className="mt-2 text-indigo-600 font-semibold hover:underline flex items-center gap-1">
                        + Add Another Medication
                      </button>
                    </div>
                  </QuestionBlock>
                </div>
                
                <div className="col-span-1 md:col-span-2">
                    <QuestionBlock index={4} label="Clinical Disposition" subLabel="Intervention taken and patient status outcome">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-semibold text-slate-500 block mb-1">Intervention Taken by Pharmacist/MD</label>
                                <select name="intervention" value={patient.intervention} onChange={handlePatientChange} className="w-full p-2 border rounded bg-slate-50">
                                    <option>Monitoring Only</option>
                                    <option>Dose Reduced</option>
                                    <option>Drug Discontinued</option>
                                    <option>Alternative Therapy Prescribed</option>
                                    <option>Patient Counseling Provided</option>
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-semibold text-slate-500 block mb-1">Patient Status / Outcome</label>
                                <select name="outcome" value={patient.outcome} onChange={handlePatientChange} className="w-full p-2 border rounded bg-slate-50">
                                    <option>Stable</option>
                                    <option>Recovered</option>
                                    <option>Improved</option>
                                    <option>No Change</option>
                                    <option>Deteriorated</option>
                                    <option>Deceased</option>
                                </select>
                            </div>
                        </div>
                    </QuestionBlock>
                </div>
              </div>

              <div className="flex justify-end gap-3">
                <button 
                  onClick={runClinicalAnalysis} 
                  disabled={loading}
                  className="bg-indigo-600 text-white px-6 py-3 rounded-lg shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2 font-bold disabled:opacity-50"
                >
                  {loading ? 'Processing Protocol...' : 'Run Clinical Analysis'} <BrainCircuit className="w-5 h-5" />
                </button>
              </div>
            </div>
          );

          // NEW: Records View with EDIT Capability
          const renderRecords = () => (
              <div className="max-w-6xl mx-auto">
                 <div className="flex justify-between items-center mb-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-900">Patient Records</h2>
                        <p className="text-slate-500 text-sm">Stored locally {supabaseClient ? '& Synced to Cloud' : '(Local Only - Add API Keys for Cloud)'}.</p>
                    </div>
                    <div className="text-sm bg-white border px-3 py-1 rounded">
                        Total Records: <span className="font-bold">{savedRecords.length}</span>
                    </div>
                 </div>

                 {savedRecords.length === 0 ? (
                      <div className="text-center p-12 bg-white rounded-lg border border-dashed">
                        <Folder className="w-12 h-12 text-slate-300 mx-auto mb-4"/>
                        <p className="text-slate-500">No records saved yet.</p>
                        <button onClick={() => setActiveTab('intake')} className="text-indigo-600 font-bold mt-2">Create New Entry</button>
                      </div>
                 ) : (
                      <div className="bg-white rounded-lg shadow overflow-hidden border">
                          <table className="w-full text-sm text-left">
                             <thead className="bg-slate-50 text-slate-700 font-bold border-b">
                                 <tr>
                                     <th className="p-4">Patient ID</th>
                                     <th className="p-4">Date</th>
                                     <th className="p-4">Demographics</th>
                                     <th className="p-4">Condition</th>
                                     <th className="p-4">Outcome</th>
                                     <th className="p-4 text-right">Action</th>
                                 </tr>
                             </thead>
                             <tbody className="divide-y">
                                 {savedRecords.map((rec, i) => (
                                     <tr key={i} className="hover:bg-slate-50">
                                         <td className="p-4 font-mono font-bold text-indigo-600">{rec.patientId}</td>
                                         <td className="p-4 text-slate-500">{new Date(rec.timestamp).toLocaleDateString()}</td>
                                         <td className="p-4">{rec.demographics.age}y / {rec.demographics.gender}</td>
                                         <td className="p-4 text-slate-600">{rec.demographics.conditions}</td>
                                         <td className="p-4">
                                             <span className={`px-2 py-1 rounded-full text-xs font-bold ${rec.disposition.outcome === 'Deceased' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                                 {rec.disposition.outcome}
                                             </span>
                                         </td>
                                         <td className="p-4 text-right flex justify-end gap-2">
                                             {/* View/Print shortcut */}
                                             <button onClick={() => openPrintModal(rec)} className="text-slate-600 hover:text-slate-900 p-1 flex items-center gap-1 font-semibold text-xs border border-slate-200 rounded px-2 bg-white" title="View & Print">
                                                 <Printer className="w-3 h-3"/> View
                                             </button>
                                             <button onClick={() => loadRecordForEditing(rec)} className="text-indigo-600 hover:text-indigo-800 p-1 flex items-center gap-1 font-semibold text-xs border border-indigo-200 rounded px-2 bg-indigo-50">
                                                 <Edit className="w-3 h-3"/> Edit Case
                                             </button>
                                             <button onClick={() => deleteRecord(rec.patientId)} className="text-red-500 hover:text-red-700 p-1" title="Delete Record">
                                                 <Trash2 className="w-4 h-4"/>
                                             </button>
                                         </td>
                                     </tr>
                                 ))}
                             </tbody>
                          </table>
                      </div>
                 )}
              </div>
          );

          const renderAnalysis = () => (
            <div className="max-w-6xl mx-auto space-y-6">
              <div className="flex justify-between items-center mb-4">
                <div>
                   <h2 className="text-2xl font-bold text-slate-900">Interaction Matrix</h2>
                   <p className="text-slate-500 text-sm">AI-Verified • Guidelines Referenced (ACC, Lexicomp)</p>
                </div>
                <div className="flex gap-2">
                   {/* Full Fledged PDF Button */}
                   <button onClick={() => openPrintModal()} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 flex items-center gap-2 shadow-sm font-bold">
                       <FileText className="w-4 h-4"/> Download Report as PDF
                   </button>
                   <button onClick={() => exportData('csv')} className="px-4 py-2 border rounded hover:bg-slate-50 flex items-center gap-2">
                       <Download className="w-4 h-4"/> Export CSV
                   </button>
                </div>
              </div>

              {interactions.length === 0 && !loading && (
                <div className="text-center p-12 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                  <Stethoscope className="w-12 h-12 text-slate-300 mx-auto mb-4"/>
                  <h3 className="text-lg font-medium text-slate-600">No Analysis Run Yet</h3>
                  <button onClick={() => setActiveTab('intake')} className="text-indigo-600 underline">Return to Intake to run analysis</button>
                </div>
              )}

              {interactions.map((item, idx) => (
                <div key={idx} className={`bg-white border-l-8 rounded-r-lg shadow-sm p-6 ${item.severity === 'Major' ? 'border-red-500' : item.severity === 'Moderate' ? 'border-orange-500' : 'border-blue-500'}`}>
                  <div className="flex justify-between items-start mb-4">
                    <div>
                       <div className="flex items-center gap-3 mb-1">
                         <h3 className="text-lg font-bold text-slate-900">{item.pair}</h3>
                         <SeverityBadge level={item.severity} />
                       </div>
                       <p className="text-sm font-medium text-slate-600">Mechanism: {item.mechanism}</p>
                    </div>
                    <div className="text-right">
                        <span className="text-xs text-slate-400 block uppercase tracking-wide">Confidence</span>
                        <span className="text-sm font-bold text-green-600">High (98%)</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-4 rounded-lg mb-4">
                    <div>
                      <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">Clinical Effect</h4>
                      <p className="text-sm text-slate-800">{item.effect}</p>
                    </div>
                    <div>
                       <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">Recommendation</h4>
                       <p className="text-sm text-slate-800 font-medium">{item.recommendation}</p>
                    </div>
                  </div>

                  <div className="border-t pt-4 mt-4">
                      <h4 className="flex items-center gap-2 text-sm font-bold text-indigo-700 mb-2">
                        <Activity className="w-4 h-4"/> AI Dose Adjustment Calculator
                      </h4>
                      <div className="bg-indigo-50 p-3 rounded border border-indigo-100 text-sm text-indigo-900">
                        {item.dose_adjustment || "No specific dose adjustment algorithm required for this pair."}
                      </div>
                   </div>

                  {item.formula && (
                    <div className="mt-3 p-3 bg-slate-800 text-slate-200 rounded text-xs font-mono whitespace-pre-wrap border border-slate-700">
                        <strong className="block text-slate-400 mb-1 uppercase tracking-wider flex items-center gap-2"><Calculator className="w-3 h-3"/> Adjustment Mathematics:</strong>
                        {item.formula}
                    </div>
                  )}

                  <div className="mt-3 flex gap-2 text-xs text-slate-400">
                      <span>References:</span>
                      {item.references && item.references.map((ref, rIdx) => {
                          const title = typeof ref === 'string' ? ref : ref.title;
                          const url = `https://scholar.google.com/scholar?q=${encodeURIComponent(title)}`;
                          return (
                            <a key={rIdx} href={url} target="_blank" className="underline cursor-pointer hover:text-indigo-600">{title}</a>
                          );
                      })}
                  </div>
                  
                  {/* Specific Search Links for this Pair */}
                  <ClinicalSearchLinks pair={item.pair} />
                </div>
              ))}
            </div>
          );

          const renderDashboard = () => {
            const severityCounts = { Major: 0, Moderate: 0, Minor: 0 };
            interactions.forEach(i => {
              if (severityCounts[i.severity] !== undefined) severityCounts[i.severity]++;
              else if (i.severity === 'Major') severityCounts.Major++;
              else if (i.severity === 'Moderate') severityCounts.Moderate++;
              else severityCounts.Minor++;
            });

            return (
              <div className="max-w-6xl mx-auto">
                <h2 className="text-2xl font-bold text-slate-900 mb-6">Clinical Analytics Dashboard</h2>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                   <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                     <div className="text-slate-500 text-sm font-medium mb-1">Total Interactions</div>
                     <div className="text-4xl font-bold text-slate-900">{interactions.length}</div>
                     <div className="text-xs text-green-600 mt-2 flex items-center gap-1"><CheckCircle className="w-3 h-3"/> Engine Active</div>
                   </div>
                   <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                     <div className="text-slate-500 text-sm font-medium mb-1">Highest Severity</div>
                     <div className={`text-4xl font-bold ${interactions.some(i => i.severity === 'Major') ? 'text-red-600' : 'text-orange-500'}`}>
                        {interactions.some(i => i.severity === 'Major') ? 'Major' : interactions.length > 0 ? 'Moderate' : 'None'}
                     </div>
                     <div className="text-xs text-red-500 mt-2 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> Intervention Needed</div>
                   </div>
                   <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                     <div className="text-slate-500 text-sm font-medium mb-1">Renal Risk Factor</div>
                     <div className="text-4xl font-bold text-indigo-600">{patient.crcl < 60 ? 'High' : 'Low'}</div>
                     <div className="text-xs text-slate-400 mt-2">Based on CrCl {patient.crcl}</div>
                   </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                   <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                     <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2"><BarChart2 className="w-5 h-5"/> Interaction Severity Distribution</h3>
                     <div className="space-y-6">
                        {Object.entries(severityCounts).map(([key, count]) => {
                          const max = Math.max(1, interactions.length);
                          const percent = (count / max) * 100;
                          return (
                            <div key={key}>
                              <div className="flex justify-between text-sm mb-1">
                                <span className="font-medium text-slate-700">{key}</span>
                                <span className="text-slate-500">{count}</span>
                              </div>
                              <div className="w-full bg-slate-100 rounded-full h-3">
                                <div 
                                  className={`h-3 rounded-full transition-all duration-1000`} 
                                  style={{ width: `${percent}%`, backgroundColor: SEVERITY_HEX[key] || '#ccc' }}
                                ></div>
                              </div>
                            </div>
                          )
                        })}
                     </div>
                   </div>

                   <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                      <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Activity className="w-5 h-5"/> Organ System Risk Heatmap</h3>
                      <div className="grid grid-cols-2 gap-4">
                         <div className={`p-4 rounded border text-center ${interactions.some(i=>i.mechanism.includes('CYP') || i.mechanism.includes('Metabolism')) ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                            <div className="text-sm font-bold text-slate-700">Hepatic</div>
                            <div className="text-xs text-slate-500 mt-1">Metabolism</div>
                         </div>
                         <div className={`p-4 rounded border text-center ${patient.crcl < 50 ? 'bg-orange-50 border-orange-200' : 'bg-green-50 border-green-200'}`}>
                            <div className="text-sm font-bold text-slate-700">Renal</div>
                            <div className="text-xs text-slate-500 mt-1">Clearance</div>
                         </div>
                         <div className={`p-4 rounded border text-center ${interactions.some(i=>i.pair.includes('Warfarin') || i.pair.includes('Aspirin')) ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                            <div className="text-sm font-bold text-slate-700">Hematologic</div>
                            <div className="text-xs text-slate-500 mt-1">Bleeding</div>
                         </div>
                         <div className={`p-4 rounded border text-center ${interactions.some(i=>i.pair.includes('Amiodarone')) ? 'bg-yellow-50 border-yellow-200' : 'bg-slate-50 border-slate-200'}`}>
                            <div className="text-sm font-bold text-slate-700">Cardiac</div>
                            <div className="text-xs text-slate-500 mt-1">Rhythm</div>
                         </div>
                      </div>
                   </div>
                </div>
              </div>
            );
          };

          const renderChat = () => (
            <div className="h-[600px] flex flex-col bg-white rounded-lg shadow-sm border border-slate-200">
              <div className="p-4 border-b bg-slate-50 rounded-t-lg">
                <h3 className="font-bold text-slate-800 flex items-center gap-2">
                  <Database className="w-5 h-5 text-indigo-600"/> Ask the Clinical Data Analyst
                </h3>
                <p className="text-xs text-slate-500">Secure environment. Queries restricted to current dataset.</p>
              </div>
              
              <div className="flex-grow overflow-y-auto p-4 space-y-4">
                {chatHistory.map((msg, idx) => (
                  <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[80%] p-3 rounded-lg text-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-800'}`}>
                      {msg.role === 'system' && <span className="block text-xs font-bold mb-1 opacity-50">SYSTEM</span>}
                      {msg.text}
                    </div>
                  </div>
                ))}
                {loading && <div className="text-xs text-slate-400 italic p-2">Analyst is typing...</div>}
              </div>

              <div className="p-4 border-t">
                <div className="flex gap-2">
                  <input 
                    className="flex-grow p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="e.g. 'What is the mortality risk for this interaction?'"
                    value={chatQuery}
                    onChange={(e) => setChatQuery(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleAskData()}
                  />
                  <button 
                    onClick={handleAskData}
                    disabled={loading}
                    className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700"
                  >
                    Send
                  </button>
                </div>
              </div>
            </div>
          );

          if (!isAuthenticated) {
            return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
          }

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-900 flex">
              {/* Settings Modal */}
              {showSettings && (
                  <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 app-interface">
                      <div className="bg-white rounded-lg p-6 w-full max-w-md shadow-2xl">
                          <h3 className="text-xl font-bold text-slate-800 mb-4">System Configuration</h3>
                          <div className="mb-4">
                              <label className="block text-sm font-semibold text-slate-600 mb-2">Gemini API Key</label>
                              <p className="text-xs text-slate-400 mb-2">Could not fetch key from server. Please enter manually to enable AI features.</p>
                              <input 
                                  type="password" 
                                  value={geminiKey} 
                                  onChange={(e) => setGeminiKey(e.target.value)}
                                  className="w-full p-2 border rounded"
                                  placeholder="AIzaSy..."
                              />
                          </div>
                          <div className="flex justify-end gap-2">
                              <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-slate-500 hover:text-slate-800">Close</button>
                              <button onClick={() => setShowSettings(false)} className="px-4 py-2 bg-indigo-600 text-white rounded">Save Configuration</button>
                          </div>
                      </div>
                  </div>
              )}
              
              {/* Print Preview Modal */}
              {printData && (
                  <div className="fixed inset-0 bg-slate-900/90 z-50 flex flex-col overflow-hidden app-interface">
                      <div className="flex justify-between items-center p-4 bg-white/10 backdrop-blur-sm border-b border-white/10 text-white">
                          <h2 className="text-xl font-bold flex items-center gap-2"><Printer className="w-5 h-5"/> Print Preview</h2>
                          <div className="flex gap-3">
                              <button onClick={() => window.print()} className="bg-white text-indigo-900 px-4 py-2 rounded font-bold shadow hover:bg-indigo-50 flex items-center gap-2">
                                  <Printer className="w-4 h-4"/> Print / Save PDF
                              </button>
                              <button onClick={() => setPrintData(null)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded">
                                  <X className="w-5 h-5"/>
                              </button>
                          </div>
                      </div>
                      <div className="flex-grow overflow-auto p-8 flex justify-center bg-slate-800">
                          <div className="bg-white shadow-2xl w-full max-w-[21cm] min-h-[29.7cm] relative">
                              <PrintableReportContent 
                                  patient={printData.patient || printData.demographics} 
                                  drugs={printData.drugs || printData.medications} 
                                  interactions={printData.interactions || []} 
                              />
                          </div>
                      </div>
                  </div>
              )}

              <div className="w-64 bg-slate-900 text-white flex flex-col fixed h-full z-10 sidebar app-interface">
                <div className="p-6 border-b border-slate-800">
                  <h1 className="text-xl font-bold tracking-tight flex items-center gap-2">
                    <Activity className="text-indigo-400"/> ClinIQ <span className="text-xs bg-indigo-600 px-1 rounded">PRO</span>
                  </h1>
                  <p className="text-xs text-slate-400 mt-1 mb-4">Clinical Intelligence Platform</p>
                  
                  {/* New Patient Button */}
                  <button onClick={resetPatient} className="w-full bg-indigo-800 hover:bg-indigo-700 text-indigo-100 py-2 rounded flex items-center justify-center gap-2 text-sm font-semibold border border-indigo-700 transition-all">
                      <Plus className="w-4 h-4"/> New Patient Case
                  </button>
                </div>
                
                <nav className="flex-grow p-4 space-y-2">
                  <button onClick={() => setActiveTab('intake')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === 'intake' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <FileText className="w-4 h-4"/> Patient Intake
                  </button>
                  <button onClick={() => setActiveTab('analysis')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === 'analysis' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <AlertTriangle className="w-4 h-4"/> Interaction Report
                    {interactions.length > 0 && <span className="ml-auto bg-red-500 text-white text-xs px-1.5 rounded-full">{interactions.length}</span>}
                  </button>
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <BarChart2 className="w-4 h-4"/> Analytics Dashboard
                  </button>
                  <button onClick={() => setActiveTab('records')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === 'records' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <Folder className="w-4 h-4"/> Patient Records
                  </button>
                  <button onClick={() => setActiveTab('chat')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === 'chat' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <MessageSquare className="w-4 h-4"/> Ask the Data
                  </button>
                </nav>

                <div className="p-4 border-t border-slate-800">
                    <button onClick={saveToServer} className="w-full bg-indigo-700 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 mb-4">
                        <Save className="w-4 h-4" /> Save Patient Record
                    </button>
                    
                    {/* Manual Settings Access */}
                    <button onClick={() => setShowSettings(true)} className="w-full text-slate-400 hover:text-white flex items-center justify-center gap-2 text-xs mb-4">
                        <Settings className="w-3 h-3"/> System Settings
                    </button>

                  <div className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center">
                        <User className="w-4 h-4 text-slate-300"/>
                      </div>
                      <div>
                        <div className="text-sm font-medium">Dr. Roberts</div>
                        <div className="text-xs text-slate-500">Chief Pharmacist</div>
                      </div>
                   </div>
                </div>
              </div>

              <div className="flex-grow ml-64 p-8 overflow-y-auto main-content relative app-interface">
                <header className="flex justify-between items-center mb-8 no-print">
                   <div>
                     <h2 className="text-2xl font-bold text-slate-800 capitalize">{activeTab.replace('-', ' ')}</h2>
                     <p className="text-slate-500 text-sm">Session ID: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                   </div>
                   <div className="flex gap-3">
                      <div className="px-3 py-1 bg-white border rounded-full text-xs font-medium text-slate-600 flex items-center gap-2">
                         <span className={`w-2 h-2 rounded-full ${geminiKey ? 'bg-green-500' : 'bg-orange-500'}`}></span> {geminiKey ? 'AI Online' : 'AI Offline'}
                      </div>
                      <div className="px-3 py-1 bg-white border rounded-full text-xs font-medium text-slate-600 flex items-center gap-2">
                         <span className={`w-2 h-2 rounded-full ${supabaseClient ? 'bg-green-500' : 'bg-red-500'}`}></span> {supabaseClient ? 'Cloud Sync On' : 'Local Only'}
                      </div>
                   </div>
                </header>

                {activeTab === 'intake' && renderIntake()}
                {activeTab === 'analysis' && renderAnalysis()}
                {activeTab === 'dashboard' && renderDashboard()}
                {activeTab === 'records' && renderRecords()}
                {activeTab === 'chat' && renderChat()}
                
                {/* Global Notification Toast */}
                {notification && <Toast message={notification.message} type={notification.type} />}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClinIQPlatform />);
    </script>
</body>
</html>
