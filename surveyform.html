<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinIQ - Clinical Intelligence Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        /* Custom print styles for A4 PDF */
        @media print {
            @page { 
                size: A4; 
                margin: 12mm; /* Safe hardware margins */
            }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                font-size: 10.5pt; 
                color: #1e293b; 
            }
            
            .report-content {
                padding: 0 !important;
            }
            
            /* Professional Print Table Styling */
            table { width: 100%; border-collapse: collapse; }
            th { background-color: #f1f5f9 !important; color: #334155 !important; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; border-bottom: 2px solid #cbd5e1; }
            td { border-bottom: 1px solid #e2e8f0; padding: 8px 12px; }
            tr:last-child td { border-bottom: none; }
            
            /* Ensure page breaks don't chop interaction cards */
            .interaction-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
            .section-break { break-before: always; page-break-before: always; }
            
            /* Print-friendly colors */
            .text-indigo-600 { color: #4f46e5 !important; }
            .bg-indigo-50 { background-color: #eef2ff !important; }
            
            /* Links in print */
            a { text-decoration: none; color: #2563eb; font-weight: 600; }
        }
        
        /* Toast Animation */
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast {
            animation: slideUp 0.3s ease-out forwards;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Sidebar transition */
        .sidebar-transition {
            transition: width 0.3s ease-in-out, margin-left 0.3s ease-in-out;
        }
        
        /* Modal Animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-backdrop {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const apiKey = ""; // Automatically injected by environment if left empty

        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = "https://rkfqtbjfknydcydlkauy.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_MX87w02lC19Lpxhhy3BBTg_hx4f4oxJ"; 
        
        let supabaseClient = null;
        if (SUPABASE_URL && SUPABASE_KEY) {
            try {
                if (window.supabase && window.supabase.createClient) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (e) {
                console.error("Supabase init error:", e);
            }
        }

        // --- Icons ---
        const IconWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Activity = (props) => <IconWrapper {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></IconWrapper>;
        const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></IconWrapper>;
        const FileText = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></IconWrapper>;
        const BarChart2 = (props) => <IconWrapper {...props}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></IconWrapper>;
        const User = (props) => <IconWrapper {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></IconWrapper>;
        const Download = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></IconWrapper>;
        const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconWrapper>;
        const XCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></IconWrapper>;
        const Stethoscope = (props) => <IconWrapper {...props}><path d="M4.8 2.3A.3.3 0 0 0 5 2h3a.3.3 0 0 0 .2.3l4 7v6a6 6 0 0 1-12 0v-6l4-7z"></path><path d="M14 15a6 6 0 0 0 0-12v0"></path><path d="M19 3v3"></path><path d="M21 6v-1"></path></IconWrapper>;
        const Database = (props) => <IconWrapper {...props}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></IconWrapper>;
        const BrainCircuit = (props) => <IconWrapper {...props}><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 3 2.5 2.5 0 0 0-.02 3 2.5 2.5 0 0 0 2.77 3 2.5 2.5 0 0 0 5.51.4"></path><path d="M12 2v2"></path><path d="M12 22v-2"></path><path d="M12 12v-6.5"></path><path d="M12 12h-6.5"></path><path d="M20 10.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 3 2.5 2.5 0 0 0-.02 3 2.5 2.5 0 0 0 2.77 3 2.5 2.5 0 0 0 5.51.4"></path><path d="M16 8V6"></path><path d="M16 12v-2"></path><path d="M12 12h6.5"></path></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></IconWrapper>;
        const Save = (props) => <IconWrapper {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></IconWrapper>;
        const Folder = (props) => <IconWrapper {...props}><path d="M22 19a2 2 0 0 1-2-2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></IconWrapper>;
        const Trash2 = (props) => <IconWrapper {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconWrapper>;
        const Pill = (props) => <IconWrapper {...props}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"></line></IconWrapper>;
        const Cloud = (props) => <IconWrapper {...props}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></IconWrapper>;
        const Edit = (props) => <IconWrapper {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></IconWrapper>;
        const Printer = (props) => <IconWrapper {...props}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></IconWrapper>;
        const ExternalLink = (props) => <IconWrapper {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconWrapper>;
        const SearchIcon = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconWrapper>;
        const Calculator = (props) => <IconWrapper {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconWrapper>;
        const ChevronLeft = (props) => <IconWrapper {...props}><polyline points="15 18 9 12 15 6"></polyline></IconWrapper>;
        const ChevronRight = (props) => <IconWrapper {...props}><polyline points="9 18 15 12 9 6"></polyline></IconWrapper>;
        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"></path></IconWrapper>;
        const Calendar = (props) => <IconWrapper {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconWrapper>;
        const Table = (props) => <IconWrapper {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></IconWrapper>;
        const Menu = (props) => <IconWrapper {...props}><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></IconWrapper>;
        const MessageSquare = (props) => <IconWrapper {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></IconWrapper>;

        // --- Mock Data & Constants ---
        const SEVERITY_COLORS = {
          Major: "bg-red-100 text-red-800 border-red-200",
          Moderate: "bg-orange-100 text-orange-800 border-orange-200",
          Minor: "bg-yellow-100 text-yellow-800 border-yellow-200",
          Monitoring: "bg-blue-100 text-blue-800 border-blue-200",
          Safe: "bg-green-100 text-green-800 border-green-200",
        };

        const SEVERITY_HEX = {
          Major: "#ef4444",
          Moderate: "#f97316",
          Minor: "#eab308",
          Monitoring: "#3b82f6",
          Safe: "#22c55e",
        };

        // --- Helper Components ---
        const QuestionBlock = ({ index, label, subLabel, children }) => (
          <div className="mb-6 p-4 bg-white border border-slate-200 rounded-lg shadow-sm transition-all hover:shadow-md question-block">
            <div className="flex items-start gap-3 select-none">
              <div className="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm q-number">
                {index + 1}
              </div>
              <div className="flex-grow">
                <label className="block text-sm font-semibold text-slate-800 mb-1">
                  {label}
                </label>
                {subLabel && <p className="text-xs text-slate-500 mb-3">{subLabel}</p>}
                <div className="select-text">{children}</div>
              </div>
            </div>
          </div>
        );

        const SeverityBadge = ({ level }) => (
          <span className={`px-2 py-1 rounded-full text-xs font-bold border select-none ${SEVERITY_COLORS[level] || SEVERITY_COLORS.Monitoring}`}>
            {level.toUpperCase()}
          </span>
        );

        const Toast = ({ message, type, onClose }) => (
            <div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-xl z-50 flex items-center gap-3 toast print:hidden select-none ${type === 'success' ? 'bg-emerald-600 text-white' : type === 'info' ? 'bg-indigo-600 text-white' : 'bg-red-600 text-white'}`}>
                {type === 'success' ? <CheckCircle className="w-5 h-5"/> : type === 'info' ? <Cloud className="w-5 h-5"/> : <AlertTriangle className="w-5 h-5"/>}
                <span className="font-medium text-sm">{message}</span>
            </div>
        );

        const ConfirmationModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "Confirm", cancelText = "Cancel", isDangerous = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4 modal-backdrop print:hidden">
                    <div className="bg-white rounded-lg shadow-2xl max-w-sm w-full p-6 transition-all duration-300">
                        <h3 className="text-lg font-bold text-slate-900 mb-2 select-none">{title}</h3>
                        <p className="text-slate-600 mb-6 text-sm">{message}</p>
                        <div className="flex justify-end gap-3 select-none">
                            <button 
                                onClick={onCancel}
                                className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded text-sm font-medium transition-colors"
                            >
                                {cancelText}
                            </button>
                            <button 
                                onClick={onConfirm}
                                className={`px-4 py-2 text-white rounded text-sm font-medium transition-colors ${isDangerous ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                            >
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Helper: Generate Search Links ---
        const ClinicalSearchLinks = ({ pair }) => {
            const encodedPair = encodeURIComponent(pair);
            const scholarUrl = `https://scholar.google.com/scholar?q=${encodeURIComponent(pair + " interaction mechanism")}`;
            const accUrl = `https://www.google.com/search?q=site:acc.org+${encodedPair}+interaction`;
            const lexiUrl = `https://www.google.com/search?q=Lexicomp+interaction+${encodedPair}`;
            const pubmedUrl = `https://pubmed.ncbi.nlm.nih.gov/?term=${encodedPair}+interaction`;

            return (
                <div className="mt-2 pt-2 border-t border-slate-100 flex flex-wrap gap-2 items-center text-[9px] print:text-[8px] select-none">
                    <span className="font-bold text-slate-500 flex items-center gap-1"><SearchIcon className="w-3 h-3"/> Verify:</span>
                    <a href={scholarUrl} target="_blank" className="bg-white border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-600 px-2 py-0.5 rounded transition-colors">Google Scholar</a>
                    <a href={accUrl} target="_blank" className="bg-white border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-600 px-2 py-0.5 rounded transition-colors">ACC.org</a>
                    <a href={lexiUrl} target="_blank" className="bg-white border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-600 px-2 py-0.5 rounded transition-colors">Lexicomp</a>
                    <a href={pubmedUrl} target="_blank" className="bg-white border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-600 px-2 py-0.5 rounded transition-colors">PubMed</a>
                </div>
            );
        };

        // --- Helper: Determine Route from Dosage Form ---
        const determineRoute = (dosageForm) => {
            if (!dosageForm) return 'Oral';
            const exactRoutes = ['Oral', 'IV', 'IM', 'SubQ', 'Inhaled', 'Topical', 'Rectal'];
            const matched = exactRoutes.find(r => r.toLowerCase() === dosageForm.toLowerCase());
            if (matched) return matched;
            
            const form = dosageForm.toLowerCase();
            if (form.includes('tab') || form.includes('cap') || form.includes('syrup') || form.includes('susp')) return 'Oral';
            if (form.includes('inj') || form.includes('infusion') || form.includes('iv')) return 'IV';
            if (form.includes('im')) return 'IM';
            if (form.includes('subq') || form.includes('sc')) return 'SubQ';
            if (form.includes('inhal') || form.includes('aerosol') || form.includes('neb')) return 'Inhaled';
            if (form.includes('cream') || form.includes('gel') || form.includes('oint') || form.includes('drop') || form.includes('lotion')) return 'Topical';
            if (form.includes('supp') || form.includes('rectal')) return 'Rectal';
            return 'Oral'; // Default Fallback
        };

        // --- Printable Report Component (Handles Array of Records) ---
        const PrintableReportContent = ({ records = [] }) => {
            if (!records || records.length === 0) return null;
            
            return (
                <div id="print-container" className="bg-white text-black w-full mx-auto">
                    {records.map((record, index) => {
                        const patient = record.patient || record.demographics || {};
                        const drugs = record.drugs || record.medications || [];
                        const interactions = record.interactions || [];
                        
                        return (
                            <div key={patient.id || index} className={`report-content p-6 print:p-0 ${index > 0 ? 'section-break' : ''}`}>
                                {/* Full-width colored header bar */}
                                <div className="bg-gradient-to-r from-indigo-700 to-blue-600 text-white p-6 mb-4 break-inside-avoid print:w-full print:p-3 print:mb-3 rounded-t lg:rounded-none">
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-white/10 p-1.5 rounded-lg">
                                                <Activity className="w-8 h-8 text-white print:w-6 print:h-6"/> 
                                            </div>
                                            <div>
                                                <h1 className="text-2xl font-extrabold tracking-tight print:text-lg">ClinIQ <span className="text-xs align-top bg-white/20 px-1.5 py-0.5 rounded text-white font-medium print:text-[8px]">PRO</span></h1>
                                                <p className="text-indigo-100 font-medium text-xs mt-0.5 opacity-90 print:text-[9px]">Pharmacogenomics & Interaction Intelligence</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-bold uppercase tracking-widest text-indigo-200 mb-0.5 print:text-[8px]">Report Generated</div>
                                            <div className="text-sm font-bold print:text-xs">{new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
                                            <div className="text-[10px] opacity-75 print:text-[8px]">{new Date().toLocaleTimeString()}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Header Info */}
                                <div className="flex justify-between items-end border-b-2 border-slate-800 pb-2 mb-4 print:mb-2 px-2 print:px-0">
                                    <div>
                                        <div className="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-0.5 print:text-[8px]">Patient Case Identifier</div>
                                        <div className="font-mono font-bold text-2xl tracking-wider text-indigo-900 print:text-lg print:leading-none">{patient.id}</div>
                                        {patient.ward && <div className="text-xs font-semibold text-slate-500 mt-1 print:text-[9px] print:mt-0.5">Ward: {patient.ward}</div>}
                                        {patient.admissionDate && <div className="text-xs font-semibold text-slate-500 mt-0.5 print:text-[9px]">Admitted: {patient.admissionDate} ({patient.daysAdmitted} days)</div>}
                                    </div>
                                    <div className="text-right">
                                        <div className="text-xs font-bold text-slate-700 print:text-[9px]">Confidential Medical Record</div>
                                        <div className="text-[10px] text-slate-500 print:text-[8px]">Authorized Use Only</div>
                                    </div>
                                </div>

                                {/* Patient Info Grid */}
                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4 shadow-sm print:p-2 print:mb-3 mx-2 print:mx-0">
                                    <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1 print:text-[8px]">
                                        <User className="w-3 h-3"/> Clinical Demographics
                                    </h2>
                                    <div className="grid grid-cols-2 gap-y-1.5 gap-x-8 print:gap-x-4 print:gap-y-1 text-xs print:text-[9px]">
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 gap-2">
                                            <span className="text-slate-500 font-medium whitespace-nowrap">Age / Sex</span>
                                            <span className="font-bold text-slate-900 text-right break-words">{patient.age || 'N/A'} Y / {patient.gender}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 gap-2">
                                            <span className="text-slate-500 font-medium whitespace-nowrap">Weight</span>
                                            <span className="font-bold text-slate-900 text-right">{patient.weight || 'N/A'} kg</span>
                                        </div>
                                        
                                        {/* Labs Display in Print */}
                                        {patient.rft_enabled && (
                                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 gap-2">
                                                <span className="text-slate-500 font-medium whitespace-nowrap">S. Creatinine</span>
                                                <span className="font-bold text-slate-900 text-right">{patient.serum_creatinine || 'N/A'} mg/dL</span>
                                            </div>
                                        )}
                                        {patient.lft_enabled && (
                                            <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 gap-2">
                                                <span className="text-slate-500 font-medium whitespace-nowrap">T. Bilirubin</span>
                                                <span className="font-bold text-slate-900 text-right">{patient.bilirubin || 'N/A'} mg/dL</span>
                                            </div>
                                        )}

                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 gap-2">
                                            <span className="text-slate-500 font-medium whitespace-nowrap">Diagnosis</span>
                                            <span className="font-bold text-slate-900 text-right break-words">{patient.primary_diagnosis || 'Not Specified'}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-0.5 col-span-2 gap-2">
                                            <span className="text-slate-500 font-medium whitespace-nowrap">Comorbidities</span>
                                            <span className="font-bold text-slate-900 text-right break-words">{patient.comorbidities || 'None Listed'}</span>
                                        </div>
                                    </div>

                                {/* Medications Table */}
                                <div className="mb-6 print:mb-3 mx-2 print:mx-0">
                                    <h2 className="text-sm font-bold text-slate-900 mb-2 flex items-center gap-1.5 border-b pb-1 print:text-[10px]">
                                        <Pill className="w-4 h-4 text-indigo-600 print:w-3 print:h-3"/> Pharmacotherapy Schedule
                                    </h2>
                                    <table className="w-full text-xs text-left border rounded overflow-hidden shadow-sm print:text-[8px]">
                                        <thead className="bg-slate-100 text-slate-700 font-semibold border-b">
                                        <tr>
                                            <th className="p-2 border-r w-1/4 print:p-1">Medication</th>
                                            <th className="p-2 border-r print:p-1">Dose/Route</th>
                                            {/* Generate Day Headers based on days admitted */}
                                            {Array.from({ length: patient.daysAdmitted || 3 }, (_, i) => (
                                                <th key={i} className="p-2 border-r text-center w-8 print:p-1">D{i+1}</th>
                                            ))}
                                        </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                        {drugs.length > 0 ? drugs.map((d, i) => (
                                            <tr key={i} className="even:bg-slate-50">
                                            <td className="p-2 font-bold text-slate-800 border-r print:p-1">
                                                {d.name || 'Unnamed'} {d.brand ? <span className="text-slate-500 font-normal">({d.brand})</span> : ''}
                                            </td>
                                            <td className="p-2 border-r print:p-1">
                                                {d.dose || '-'} {d.freq} ({d.route})
                                            </td>
                                            {/* Render ticks for schedule */}
                                            {Array.from({ length: patient.daysAdmitted || 3 }, (_, dayIdx) => (
                                                <td key={dayIdx} className="p-2 border-r text-center print:p-1">
                                                    {d.schedule && d.schedule[dayIdx + 1] ? <span className="text-green-600 font-bold">✓</span> : <span className="text-slate-200">-</span>}
                                                </td>
                                            ))}
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan={10} className="p-3 text-center text-slate-500 italic">No medications recorded.</td>
                                            </tr>
                                        )}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Analysis Section */}
                                <div className="mb-6 print:mb-3 mx-2 print:mx-0">
                                    <h2 className="text-sm font-bold text-slate-900 mb-2 flex items-center gap-1.5 border-b pb-1 print:text-[10px]">
                                        <AlertTriangle className="w-4 h-4 text-indigo-600 print:w-3 print:h-3"/> Daily Interaction Analysis
                                    </h2>
                                    {interactions.length > 0 ? (
                                        <div className="space-y-3 print:space-y-1.5">
                                        {interactions.map((item, idx) => (
                                            <div key={idx} className="interaction-card border border-slate-200 rounded p-3 shadow-sm bg-white relative overflow-hidden print:p-1.5">
                                                <div className={`absolute top-0 left-0 w-1.5 h-full`} style={{ backgroundColor: SEVERITY_HEX[item.severity] || '#ccc' }}></div>
                                                <div className="pl-3 print:pl-2">
                                                    <div className="flex justify-between items-start mb-2 border-b border-slate-100 pb-1.5 print:mb-1 print:pb-1">
                                                        <div>
                                                            <h3 className="font-bold text-sm text-slate-900 mb-0.5 print:text-[10px] leading-tight">{item.pair}</h3>
                                                            <div className="flex items-center gap-1.5">
                                                                <span className={`px-1.5 py-0.5 rounded-[4px] text-[9px] font-bold border uppercase tracking-wide flex items-center gap-1 print:text-[7px] print:px-1`} style={{ color: SEVERITY_HEX[item.severity], borderColor: SEVERITY_HEX[item.severity] }}>
                                                                    {item.severity} Risk
                                                                </span>
                                                                <span className="text-[10px] font-semibold text-slate-500 px-1.5 border-l border-slate-300 print:text-[8px]">{item.interaction_type}</span>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            {item.occurrence && (
                                                                <div className="mb-0.5 text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded flex items-center gap-1 justify-end print:text-[7px]">
                                                                    <Calendar className="w-2.5 h-2.5"/> {item.occurrence}
                                                                </div>
                                                            )}
                                                            <span className="text-[9px] font-bold text-green-600 print:text-[7px]">AI-Verified</span>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* Streamlined Line-by-Line Content */}
                                                    <div className="space-y-1 text-xs print:text-[8.5px] print:space-y-0.5 mb-2 print:mb-1">
                                                        <div className="flex items-start gap-1.5">
                                                            <span className="w-20 shrink-0 font-bold text-slate-500 uppercase text-[10px] pt-0.5 tracking-wider print:text-[7px] print:w-16">Mechanism</span>
                                                            <span className="text-slate-800 font-medium break-words leading-tight">{item.mechanism_short}</span>
                                                        </div>
                                                        <div className="flex items-start gap-1.5">
                                                            <span className="w-20 shrink-0 font-bold text-slate-500 uppercase text-[10px] pt-0.5 tracking-wider print:text-[7px] print:w-16">Significance</span>
                                                            <span className="text-slate-800 font-medium break-words leading-tight">{item.clinical_significance}</span>
                                                        </div>
                                                        <div className="flex items-start gap-1.5">
                                                            <span className="w-20 shrink-0 font-bold text-slate-500 uppercase text-[10px] pt-0.5 tracking-wider print:text-[7px] print:w-16">Action</span>
                                                            <span className="text-indigo-800 font-bold break-words leading-tight">{item.recommendation}</span>
                                                        </div>
                                                        {item.dose_adjustment && (
                                                            <div className="flex items-start gap-1.5 mt-1 bg-indigo-50 p-1.5 rounded border border-indigo-100 print:mt-0.5 print:p-1">
                                                                <span className="w-20 shrink-0 font-bold text-indigo-700 uppercase text-[10px] pt-0.5 tracking-wider flex items-center gap-1 print:text-[7px] print:w-16">
                                                                    Adj. Dose
                                                                </span>
                                                                <span className="text-indigo-900 font-semibold break-words leading-tight">{item.dose_adjustment}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {/* Render References as Links */}
                                                    <div className="mt-2 flex flex-wrap gap-2 justify-end text-[10px] pt-1.5 border-t border-slate-50 print:text-[8px] print:mt-1 print:pt-1">
                                                        <span className="text-slate-400 italic self-center">Evidence:</span>
                                                        {item.references && item.references.map((ref, rIdx) => {
                                                            const title = typeof ref === 'string' ? ref : ref.title;
                                                            return (
                                                                <span key={rIdx} className="text-slate-600 bg-slate-50 px-1 rounded border border-slate-200">{title}</span>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        </div>
                                    ) : (
                                        <p className="text-slate-500 italic p-4 border rounded text-center bg-slate-50 text-xs print:text-[9px]">No clinically significant interactions detected or recorded.</p>
                                    )}
                                </div>

                                {/* Disposition & Outcome */}
                                <div className="mb-4 mx-2 print:mx-0 break-inside-avoid bg-indigo-50 border border-indigo-100 p-4 rounded shadow-sm print:mb-2 print:p-2">
                                    <h2 className="text-xs font-bold text-indigo-800 uppercase mb-2 border-b border-indigo-200 pb-1 print:text-[9px]">Final Clinical Disposition</h2>
                                    <div className="grid grid-cols-2 gap-6 print:gap-4 text-sm print:text-[10px]">
                                        <div>
                                            <span className="text-[10px] text-indigo-400 block uppercase font-bold mb-0.5 print:text-[8px]">Intervention Taken</span>
                                            <span className="font-bold text-indigo-900 text-lg break-words">{patient.intervention || 'None'}</span>
                                        </div>
                                        <div>
                                            <span className="text-[10px] text-indigo-400 block uppercase font-bold mb-0.5 print:text-[8px]">Outcome Status</span>
                                            <span className="font-bold text-indigo-900 text-lg break-words">{patient.outcome || 'N/A'}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Footer */}
                                <div className="border-t-2 border-slate-800 pt-4 mt-6 mx-2 print:mx-0 flex justify-between items-end break-inside-avoid print:pt-2 print:mt-2">
                                    <div className="text-[10px] text-slate-400 max-w-sm print:text-[8px]">
                                        <p className="font-bold text-slate-900">Generated by ClinIQ AI-Assisted Platform</p>
                                        <p className="mt-0.5 leading-tight">This report is intended for use by healthcare professionals only. Interactions and recommendations must be verified against official institutional protocols.</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="h-8 w-48 border-b border-slate-400 mb-1 print:h-6 print:w-32"></div>
                                        <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest print:text-[7px]">Clinician Signature / Date</p>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // --- Login Component ---
        const LoginScreen = ({ onLogin }) => {
            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 transition-all duration-300">
                    <div className="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
                        <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4 select-none">
                            <Lock className="w-8 h-8 text-indigo-600" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 select-none">ClinIQ Access</h2>
                        <p className="text-slate-500 text-sm mt-1 mb-8 select-none">Clinical Intelligence Platform</p>
                        
                        <button onClick={onLogin} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-md flex items-center justify-center gap-2 select-none">
                            Enter Platform <ChevronRight className="w-5 h-5"/>
                        </button>
                        
                        <p className="text-xs text-slate-400 text-center mt-6 border-t pt-4 select-none">Authorized Personnel Only. Connection secured.</p>
                    </div>
                </div>
            );
        };

        // --- Main Application ---
        function ClinIQPlatform() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [activeTab, setActiveTab] = useState('intake');
          const [dashTab, setDashTab] = useState('analytics'); // Sub-tab for Dashboard
          const [loading, setLoading] = useState(false);
          const [notification, setNotification] = useState(null);
          const [geminiKey, setGeminiKey] = useState(''); 
          const [showSettings, setShowSettings] = useState(false);
          const [printData, setPrintData] = useState(null); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [lookupLoading, setLookupLoading] = useState({});
          
          const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: () => {}, isDangerous: false });

          // State for Specific Drug Deletion Modal
          const [deleteModalState, setDeleteModalState] = useState({ isOpen: false, drugData: null, fetchedForms: [], selectedFormId: null, isLoading: false });

          // State for Drug Dropdown Search
          const [activeDropdown, setActiveDropdown] = useState(null); // { id, field }
          const [drugSuggestions, setDrugSuggestions] = useState([]);
          
          // State for Patient Records printing
          const [selectedRecordIds, setSelectedRecordIds] = useState([]);
          
          // AI Chat State
          const [chatHistory, setChatHistory] = useState([]);
          const [chatInput, setChatInput] = useState('');
          const [chatLoading, setChatLoading] = useState(false);
          const chatScrollRef = useRef(null);
          
          const generateId = () => `PT-${Math.floor(100 + Math.random() * 900)}`;

          const getInitialPatientState = () => ({
            id: generateId(),
            ward: 'General Ward', 
            age: '',
            gender: 'Male',
            weight: '',
            crcl: '', 
            rft_enabled: false, 
            lft_enabled: false, 
            serum_creatinine: '', 
            bilirubin: '', 
            primary_diagnosis: '', 
            comorbidities: '',       
            intervention: 'Monitoring Only',
            outcome: 'Stable',
            daysAdmitted: 3,
            admissionDate: new Date().toISOString().split('T')[0]
          });

          const [patient, setPatient] = useState(getInitialPatientState());

          const [drugs, setDrugs] = useState([
            { id: 1, name: '', brand: '', dose: '', freq: 'QD', route: 'Oral', schedule: { 1: true, 2: true, 3: true } } 
          ]);

          const [interactions, setInteractions] = useState([]);
          const [savedRecords, setSavedRecords] = useState([]); 

          // STATE FOR EXPORT TYPE & CUSTOMIZATION
          const [exportType, setExportType] = useState('excel');
          const [showCodebook, setShowCodebook] = useState(false);
          const [exportFilter, setExportFilter] = useState('');
          const [visibleColumns, setVisibleColumns] = useState({});
          const [showColSettings, setShowColSettings] = useState(false);

          // Initialize Gemini API Key from Supabase system_settings table
          useEffect(() => {
              const fetchCloudApiKey = async () => {
                  if (!supabaseClient) return;
                  try {
                      const { data, error } = await supabaseClient
                          .from('system_settings')
                          .select('setting_value')
                          .eq('setting_name', 'gemini_api_key')
                          .single();
                          
                      if (data && data.setting_value) {
                          setGeminiKey(data.setting_value);
                      }
                  } catch (err) {
                      console.warn("Failed to load Cloud API key:", err.message);
                  }
              };
              
              fetchCloudApiKey();
          }, []);

          // --- Safe Fetch Function ---
          const fetchGoogleWithBackoff = async (url, options) => {
              let delay = 1000;
              for (let i = 0; i < 5; i++) {
                  try {
                      const response = await fetch(url, options);
                      if (response.ok) return response;
                      
                      if (response.status !== 429 && response.status < 500) {
                          const errData = await response.json().catch(() => null);
                          // Return exact debug message from Google API when it fails (e.g. Expired Key)
                          throw new Error(`API Error ${response.status}: ${errData?.error?.message || response.statusText}`);
                      }
                  } catch (error) {
                      if (i === 4 || error.message.includes('API Error')) throw error;
                  }
                  await new Promise(resolve => setTimeout(resolve, delay));
                  delay *= 2;
              }
              throw new Error("API limits exceeded or key is invalid/expired. Please check your settings.");
          };

          useEffect(() => {
              // 1. Fetch Local Data Safely
              let localRecords = [];
              try {
                const loaded = JSON.parse(localStorage.getItem('cliniq_records') || '[]');
                if (Array.isArray(loaded)) {
                    localRecords = loaded;
                    setSavedRecords(localRecords);
                }
              } catch(e) {
                  console.error("Storage access error", e);
              }

              // 2. Safely merge remote data WITHOUT wiping local data if Cloud connection fails
              const fetchRemoteRecords = async () => {
                  if (!supabaseClient) return;
                  try {
                      const { data, error } = await supabaseClient
                          .from('clinical_records')
                          .select('*')
                          .order('created_at', { ascending: false });
                      
                      if (error) throw error; // Fails fast if DB lacks permissions

                      if (data && data.length > 0) {
                          const remoteRecords = data.map(row => ({
                              patientId: row.patient_id,
                              timestamp: row.created_at,
                              demographics: row.demographics || {},
                              medications: row.medications || [],
                              interactions: row.interactions || [],
                              disposition: row.disposition || {}
                          }));
                          
                          // Merge local and remote, favoring remote records by patientId
                          const mergedMap = new Map();
                          localRecords.forEach(r => mergedMap.set(r.patientId, r));
                          remoteRecords.forEach(r => mergedMap.set(r.patientId, r));
                          
                          const merged = Array.from(mergedMap.values()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                          
                          setSavedRecords(merged);
                          localStorage.setItem('cliniq_records', JSON.stringify(merged));
                      }
                  } catch (err) {
                      console.warn("Cloud sync ignored - using local records. Error:", err.message);
                  }
              };
              fetchRemoteRecords();
          }, []);

          useEffect(() => {
              if (notification) {
                  const timer = setTimeout(() => setNotification(null), 5000);
                  return () => clearTimeout(timer);
              }
          }, [notification]);
          
          useEffect(() => {
              if (chatScrollRef.current) {
                  chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
              }
          }, [chatHistory, chatLoading]);

          const handlePatientChange = (e) => {
            const { name, value, type, checked } = e.target;
            setPatient({ 
                ...patient, 
                [name]: type === 'checkbox' ? checked : value 
            });
          };

          const addDrug = () => {
            const newId = drugs.length > 0 ? Math.max(...drugs.map(d => d.id)) + 1 : 1;
            const initialSchedule = {};
            for(let i=1; i<=patient.daysAdmitted; i++) initialSchedule[i] = true;
            
            setDrugs([...drugs, { id: newId, name: '', brand: '', dose: '', freq: 'QD', route: 'Oral', schedule: initialSchedule }]);
          };

          const updateDrug = (id, field, value) => {
            setDrugs(drugs.map(d => d.id === id ? { ...d, [field]: value } : d));
          };

          // --- DATABASE AUTOCOMPLETE HANDLERS (SUPABASE) ---
          const handleDrugSearchChange = (id, field, value) => {
              updateDrug(id, field, value);
              if (value.trim().length >= 2) {
                  setActiveDropdown({ id, field });

                  // Debounce search
                  if (window.searchTimeout) clearTimeout(window.searchTimeout);
                  
                  window.searchTimeout = setTimeout(async () => {
                      if (!supabaseClient) {
                          setDrugSuggestions([]);
                          return;
                      }
                      
                      try {
                          let flatResults = [];
                          
                          if (field === 'name') {
                              const { data, error } = await supabaseClient
                                  .from('generics')
                                  .select('generic_name, brands(brand_name, dosage_form, strength)')
                                  .ilike('generic_name', `%${value}%`)
                                  .limit(10);
                                  
                              if (!error && data) {
                                  data.forEach(g => {
                                      if (g.brands && g.brands.length > 0) {
                                          g.brands.forEach(b => {
                                              flatResults.push({
                                                  generic_name: g.generic_name,
                                                  brand_name: b.brand_name,
                                                  dosage_form: b.dosage_form,
                                                  strength: b.strength
                                              });
                                          });
                                      } else {
                                          flatResults.push({
                                              generic_name: g.generic_name,
                                              brand_name: '',
                                              dosage_form: '',
                                              strength: ''
                                          });
                                      }
                                  });
                              }
                          } else if (field === 'brand') {
                              const { data, error } = await supabaseClient
                                  .from('brands')
                                  .select('brand_name, dosage_form, strength, generics(generic_name)')
                                  .ilike('brand_name', `%${value}%`)
                                  .limit(10);
                                  
                              if (!error && data) {
                                  data.forEach(b => {
                                      flatResults.push({
                                          generic_name: b.generics?.generic_name || '',
                                          brand_name: b.brand_name,
                                          dosage_form: b.dosage_form,
                                          strength: b.strength
                                      });
                                  });
                              }
                          }
                          
                          // Filter duplicates for cleaner display
                          const uniqueResults = [];
                          const seen = new Set();
                          flatResults.forEach(r => {
                              const key = `${r.generic_name}-${r.brand_name}-${r.dosage_form}-${r.strength}`;
                              if(!seen.has(key)){
                                  seen.add(key);
                                  uniqueResults.push(r);
                              }
                          });
                          
                          setDrugSuggestions(uniqueResults.slice(0, 15)); // Limit to 15 results
                      } catch (e) {
                          console.error("Supabase search error:", e);
                          setDrugSuggestions([]);
                      }
                  }, 300); 
              } else {
                  setDrugSuggestions([]);
                  setActiveDropdown(null);
              }
          };

          const selectDrugSuggestion = (id, suggestion) => {
              const generic = suggestion.generic_name || '';
              const brand = suggestion.brand_name || '';
              const doseStr = (suggestion.strength && suggestion.dosage_form) 
                  ? `${suggestion.strength} ${suggestion.dosage_form}` 
                  : (suggestion.dosage_form || suggestion.strength || '');

              const derivedRoute = determineRoute(suggestion.dosage_form);

              setDrugs(prevDrugs => prevDrugs.map(d => {
                  if (d.id === id) {
                      return {
                          ...d,
                          name: generic,
                          brand: brand,
                          dose: doseStr.trim(),
                          route: derivedRoute
                      };
                  }
                  return d;
              }));
              
              setActiveDropdown(null);
              setDrugSuggestions([]);
          };
          
          const toggleDrugSchedule = (id, day) => {
              setDrugs(drugs.map(d => {
                  if (d.id === id) {
                      const newSchedule = { ...d.schedule };
                      newSchedule[day] = !newSchedule[day];
                      return { ...d, schedule: newSchedule };
                  }
                  return d;
              }));
          };

          const removeDrug = (id) => {
            setDrugs(drugs.filter(d => d.id !== id));
          };

          // Function to safely save new drugs to the Supabase Database directly
          const saveDrugToCloudDB = async (drug) => {
              if (!supabaseClient) {
                  setNotification({ type: 'error', message: 'Cloud sync not configured.' });
                  return;
              }
              if (!drug.name || drug.name.trim() === '') {
                  setNotification({ type: 'error', message: 'Generic name is required to save.' });
                  return;
              }
              
              setLoading(true);
              try {
                  const genericName = drug.name.trim();
                  const brandName = drug.brand ? drug.brand.trim() : genericName;
                  const doseString = drug.dose ? drug.dose.trim() : 'Standard';
                  const dosageForm = drug.route || 'Oral';
                  
                  // 1. Check if generic exists
                  let genericId = null;

                  const interventionRequired = disp.intervention && disp.intervention !== 'Monitoring Only' ? 1 : 0;
                  const icuTransfer = demo.ward === 'ICU (Intensive Care)' ? 1 : 0;
                  const mortality = disp.outcome === 'Deceased' ? 1 : 0;

                  return {
                      Sr_No: index + 1,
                      Patient_ID: rec.patientId,
                      Age: demo.age || '',
                      Gender: demo.gender === 'Female' ? 2 : 1, // Optional: numeric gender (1=Male, 2=Female)
                      Ward_Type: demo.ward || '',
                      Length_of_Stay_Days: demo.daysAdmitted || 0,
                      Primary_Diagnosis: numDiagnosis,
                      Number_of_Comorbidities: numComorbidities,
                      Renal_Impairment: hasRenalImpairment,
                      Hepatic_Impairment: hasHepaticImpairment,
                      Total_Number_of_Drugs: totalDrugs,
                      Polypharmacy: polypharmacy,
                      Total_DDIs: inters.length,
                      Major_DDI_Count: majorCount,
                      Moderate_DDI_Count: moderateCount,
                      Minor_DDI_Count: minorCount,
                      Monitoring_DDI_Count: monitoringCount,
                      Pharmacokinetic_DDI_Count: pkCount,
                      Pharmacodynamic_DDI_Count: pdCount,
                      Drug_Disease_Interaction_Count: diseaseCount,
                      AI_Detected_DDIs: inters.length, 
                      Clinician_Detected_DDIs: 0, 
                      Highest_DDI_Severity: highestSeverity,
                      Intervention_Required: interventionRequired,
                      Adverse_Drug_Event: 0, 
                      ICU_Transfer: icuTransfer,
                      Mortality: mortality,
                      Final_Outcome: disp.outcome || ''
                  };
              });
          };

          // Ensure columns toggle object exists
          useEffect(() => {
              const dummyData = exportType === 'spss' ? generateSpssData() : generateNormalData();
              if (dummyData.length > 0 && Object.keys(visibleColumns).length === 0) {
                  const initial = {};
                  Object.keys(dummyData[0]).forEach(key => initial[key] = true);
                  setVisibleColumns(initial);
              }
          }, [savedRecords, exportType]);

          const exportCurrentData = () => {
              let currentData = exportType === 'spss' ? generateSpssData() : generateNormalData();
              
              if (currentData.length === 0) {
                  setNotification({ type: 'info', message: 'No records available to export.' });
                  return;
              }

              // Apply Filter
              if (exportFilter.trim()) {
                  const lowerFilt = exportFilter.toLowerCase();
                  currentData = currentData.filter(row => 
                      Object.values(row).some(v => String(v).toLowerCase().includes(lowerFilt))
                  );
              }
              
              if (currentData.length === 0) {
                  setNotification({ type: 'info', message: 'No records match current filter.' });
                  return;
              }

              // Apply Visibility Settings
              const headers = Object.keys(currentData[0]).filter(h => visibleColumns[h] !== false);
              
              let csvContent = "data:text/csv;charset=utf-8,";
              
              // Add headers row
              csvContent += headers.join(",") + "\n";
              
              // Add data rows
              currentData.forEach(row => {
                  const values = headers.map(header => {
                      const val = row[header] === null || row[header] === undefined ? '' : row[header];
                      // Escape strings containing commas
                      return typeof val === 'string' && val.includes(',') ? `"${val}"` : val;
                  });
                  csvContent += values.join(",") + "\n";
              });

              const prefix = exportType === 'spss' ? 'spss' : 'generalized';
              const encodedUri = encodeURI(csvContent);
              const link = document.createElement("a");
              link.setAttribute("href", encodedUri);
              link.setAttribute("download", `cliniq_${prefix}_export_${new Date().toISOString().split('T')[0]}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          };

          // --- Views ---

          const renderIntake = () => (
            <div className="max-w-4xl mx-auto transition-all duration-300">
              <div className="bg-slate-50 border-l-4 border-indigo-600 p-4 mb-6 rounded-r-lg flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 select-none">
                <div>
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <User className="w-5 h-5" /> Patient Demographics & Regimen
                    </h2>
                    <p className="text-slate-600 text-sm">Enter baseline parameters to initialize the Interaction Engine.</p>
                </div>
                <div className="bg-white px-3 py-1 rounded border shadow-sm w-full sm:w-auto text-center sm:text-left select-text">
                    <span className="text-xs text-slate-500 block select-none">Patient ID</span>
                    <span className="font-mono font-bold text-indigo-600">{patient.id}</span>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <QuestionBlock index={0} label="Age, Gender & Location" subLabel="Demographics & Ward Assignment">
                  <div className="space-y-4">
                      <div className="flex flex-col sm:flex-row gap-4">
                        <input type="number" name="age" value={patient.age} onChange={handlePatientChange} className="w-full sm:w-24 p-2 border rounded" placeholder="Age" />
                        <select name="gender" value={patient.gender} onChange={handlePatientChange} className="w-full sm:flex-grow p-2 border rounded">
                          <option>Male</option>
                          <option>Female</option>
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Ward Assignment</label>
                        <select name="ward" value={patient.ward} onChange={handlePatientChange} className="w-full p-2 border rounded bg-slate-50">
                            <option>General Ward</option>
                            <option>ICU (Intensive Care)</option>
                            <option>CCU (Cardiac Care)</option>
                            <option>ER (Emergency)</option>
                            <option>Oncology Unit</option>
                            <option>Pediatrics</option>
                            <option>Outpatient Clinic</option>
                        </select>
                      </div>
                  </div>
                </QuestionBlock>

                <QuestionBlock index={1} label="Clinical Metrics & Labs" subLabel="Weight, Renal (RFT) & Hepatic (LFT)">
                  <div className="space-y-4">
                      <div className="flex gap-4">
                        <div className="w-full">
                          <label className="text-xs text-slate-500">Weight (kg)</label>
                          <input type="number" name="weight" value={patient.weight} onChange={handlePatientChange} className="w-full p-2 border rounded" />
                        </div>
                      </div>
                      
                      <div className="bg-slate-50 p-3 rounded border border-slate-200">
                          <label className="text-xs font-bold text-slate-700 block mb-2 select-none">Select Labs to Monitor:</label>
                          <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-3 select-none">
                              <label className="flex items-center gap-2 text-sm cursor-pointer">
                                  <input type="checkbox" name="rft_enabled" checked={patient.rft_enabled} onChange={handlePatientChange} className="rounded text-indigo-600"/>
                                  RFT (Renal)
                              </label>
                              <label className="flex items-center gap-2 text-sm cursor-pointer">
                                  <input type="checkbox" name="lft_enabled" checked={patient.lft_enabled} onChange={handlePatientChange} className="rounded text-indigo-600"/>
                                  LFT (Hepatic)
                              </label>
                          </div>
                          
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                              {patient.rft_enabled && (
                                  <div>
                                      <label className="text-xs text-slate-500">Serum Creatinine</label>
                                      <div className="flex items-center">
                                          <input type="number" name="serum_creatinine" value={patient.serum_creatinine} onChange={handlePatientChange} className="w-full p-2 border rounded-l" placeholder="0.0" step="0.1"/>
                                          <span className="bg-white border-y border-r p-2 rounded-r text-xs text-slate-500 select-none">mg/dL</span>
                                      </div>
                                  </div>
                              )}
                              {patient.lft_enabled && (
                                  <div>
                                      <label className="text-xs text-slate-500">Total Bilirubin</label>
                                      <div className="flex items-center">
                                          <input type="number" name="bilirubin" value={patient.bilirubin} onChange={handlePatientChange} className="w-full p-2 border rounded-l" placeholder="0.0" step="0.1"/>
                                          <span className="bg-white border-y border-r p-2 rounded-r text-xs text-slate-500 select-none">mg/dL</span>
                                      </div>
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
                </QuestionBlock>

                <div className="col-span-1 md:col-span-2">
                  <QuestionBlock index={2} label="Clinical Diagnosis" subLabel="ICD-10 Mappings & Comorbidities">
                    <div className="space-y-4">
                        <div>
                            <label className="text-xs font-semibold text-slate-500 block mb-1">Primary Diagnosis</label>
                            <input type="text" name="primary_diagnosis" value={patient.primary_diagnosis} onChange={handlePatientChange} className="w-full p-2 border rounded" placeholder="e.g. Atrial Fibrillation" />
                        </div>
                        <div>
                            <label className="text-xs font-semibold text-slate-500 block mb-1">Comorbidities</label>
                            <input type="text" name="comorbidities" value={patient.comorbidities} onChange={handlePatientChange} className="w-full p-2 border rounded" placeholder="e.g. Hypertension, Diabetes Type 2" />
                        </div>
                    </div>
                  </QuestionBlock>
                </div>

                <div className="col-span-1 md:col-span-2">
                  <QuestionBlock index={3} label="Pharmacotherapy Schedule" subLabel="Admission Timeline & Drug Selection">
                    <div className="mb-6 p-4 bg-indigo-50 rounded border border-indigo-100 flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
                        <div className="w-full sm:w-auto">
                            <label className="text-xs font-bold text-indigo-800 uppercase block mb-1 select-none">Admission Date</label>
                            <input type="date" name="admissionDate" value={patient.admissionDate} onChange={handlePatientChange} className="w-full p-2 rounded border border-indigo-200 text-indigo-900 font-medium" />
                        </div>
                        <div className="w-full sm:w-auto">
                            <label className="text-xs font-bold text-indigo-800 uppercase block mb-1 select-none">Days Admitted (1-7)</label>
                            <select name="daysAdmitted" value={patient.daysAdmitted} onChange={(e) => setPatient({...patient, daysAdmitted: parseInt(e.target.value)})} className="w-full sm:w-24 p-2 rounded border border-indigo-200 text-center font-bold">
                                {[1,2,3,4,5,6,7].map(d => <option key={d} value={d}>{d} Day{d > 1 ? 's' : ''}</option>)}
                            </select>
                        </div>
                        <div className="flex-grow text-xs text-indigo-700 italic border-l-4 sm:border-l sm:border-t-0 border-indigo-200 pl-4 py-1 sm:py-0 w-full sm:w-auto select-none">
                            Select days to analyze daily interaction rationality.
                        </div>
                    </div>

                    <div className="space-y-4">
                      {drugs.map((drug, i) => (
                        <div key={drug.id} className="flex flex-col gap-3 bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm relative transition-all duration-300">
                          <div className="flex flex-col lg:flex-row gap-4 lg:items-end w-full">
                              <div className="absolute top-2 left-2 w-6 h-6 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center text-xs font-bold lg:static lg:w-8 lg:h-auto lg:bg-transparent lg:text-slate-400 lg:pb-1 lg:text-center select-none">{i+1}</div>
                              
                              {/* LIVE AUTOCOMPLETE DATABASE SEARCH */}
                              <div className="flex-1 min-w-0 w-full mt-6 lg:mt-0 relative">
                                <label className="text-xs font-semibold text-slate-500 mb-1 block select-none">Generic Name</label>
                                <div className="flex">
                                    <input 
                                        type="text" 
                                        value={drug.name} 
                                        onChange={(e) => handleDrugSearchChange(drug.id, 'name', e.target.value)} 
                                        onFocus={(e) => handleDrugSearchChange(drug.id, 'name', e.target.value)}
                                        onBlur={() => setTimeout(() => setActiveDropdown(null), 200)}
                                        className="w-full p-2 lg:p-1 border rounded-l bg-white" 
                                        placeholder="Type generic name..." 
                                        autoComplete="off"
                                    />
                                    <button 
                                        onClick={() => lookupDrugDetails(drug.id, drug.name)} 
                                        className="bg-indigo-50 p-2 lg:p-1 border-y border-r rounded-r text-indigo-600 hover:bg-indigo-100 disabled:opacity-50 shrink-0 select-none" 
                                        title="AI Smart Fill"
                                        disabled={lookupLoading[drug.id]}
                                    >
                                        {lookupLoading[drug.id] ? <div className="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div> : <Sparkles className="w-4 h-4"/>}
                                    </button>
                                </div>
                                {/* Dropdown Menu - Card Style */}
                                {activeDropdown?.id === drug.id && activeDropdown?.field === 'name' && drugSuggestions.length > 0 && (
                                    <div className="absolute z-50 w-full lg:w-80 bg-slate-50 border border-slate-200 mt-1 rounded-md shadow-xl max-h-60 overflow-y-auto p-2">
                                        <div className="text-xs font-bold text-slate-500 mb-2 px-1 select-none">Select a Medication:</div>
                                        <div className="grid grid-cols-1 gap-2">
                                            {drugSuggestions.map((suggestion, idx) => {
                                                const brandText = suggestion.brand_name || '';
                                                const doseText = (suggestion.strength && suggestion.dosage_form) 
                                                    ? `${suggestion.strength} ${suggestion.dosage_form}` 
                                                    : (suggestion.dosage_form || suggestion.strength || '');
                                                
                                                return (
                                                    <div 
                                                        key={idx} 
                                                        onMouseDown={(e) => { e.preventDefault(); selectDrugSuggestion(drug.id, suggestion); }}
                                                        className="p-2.5 bg-white border border-slate-200 rounded-md shadow-sm hover:border-indigo-400 hover:ring-1 hover:ring-indigo-400 cursor-pointer transition-all text-left"
                                                    >
                                                        <div className="font-bold text-indigo-900 text-sm">
                                                            {suggestion.generic_name}
                                                        </div>
                                                        <div className="text-xs text-indigo-600 mt-0.5 font-medium">
                                                            {brandText ? `Brand: ${brandText}` : 'No Brand (Generic Only)'}
                                                        </div>
                                                        {doseText && (
                                                            <div className="text-[10px] text-slate-500 mt-1 bg-slate-100 inline-block px-1.5 py-0.5 rounded">
                                                                {doseText}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                              </div>

                              <div className="flex-1 min-w-0 w-full relative">
                                <label className="text-xs font-semibold text-slate-500 mb-1 block select-none">Brand (Optional)</label>
                                <div className="flex">
                                    <input 
                                        type="text" 
                                        value={drug.brand} 
                                        onChange={(e) => handleDrugSearchChange(drug.id, 'brand', e.target.value)} 
                                        onFocus={(e) => handleDrugSearchChange(drug.id, 'brand', e.target.value)}
                                        onBlur={() => setTimeout(() => setActiveDropdown(null), 200)}
                                        className="w-full p-2 lg:p-1 border rounded-l bg-white" 
                                        placeholder="Search Brand..." 
                                        autoComplete="off"
                                    />
                                    <button
