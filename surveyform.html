                                        onClick={() => lookupDrugDetails(drug.id, drug.brand || drug.name)} 
                                        className="bg-indigo-50 p-2 lg:p-1 border-y border-r rounded-r text-indigo-600 hover:bg-indigo-100 disabled:opacity-50 shrink-0 select-none" 
                                        title="AI Smart Fill"
                                        disabled={lookupLoading[drug.id]}
                                    >
                                        {lookupLoading[drug.id] ? <div className="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div> : <Sparkles className="w-4 h-4"/>}
                                    </button>
                                </div>
                                {/* Dropdown Menu for Brand - Card Style */}
                                {activeDropdown?.id === drug.id && activeDropdown?.field === 'brand' && drugSuggestions.length > 0 && (
                                    <div className="absolute z-50 w-full lg:w-80 bg-slate-50 border border-slate-200 mt-1 rounded-md shadow-xl max-h-60 overflow-y-auto p-2">
                                        <div className="text-xs font-bold text-slate-500 mb-2 px-1 select-none">Select a Medication:</div>
                                        <div className="grid grid-cols-1 gap-2">
                                            {drugSuggestions.map((suggestion, idx) => {
                                                const brandText = suggestion.brand_name || '';
                                                const doseText = (suggestion.strength && suggestion.dosage_form) 
                                                    ? `${suggestion.strength} ${suggestion.dosage_form}` 
                                                    : (suggestion.dosage_form || suggestion.strength || '');

                                                return (
                                                    <div 
                                                        key={idx} 
                                                        onMouseDown={(e) => { e.preventDefault(); selectDrugSuggestion(drug.id, suggestion); }}
                                                        className="p-2.5 bg-white border border-slate-200 rounded-md shadow-sm hover:border-indigo-400 hover:ring-1 hover:ring-indigo-400 cursor-pointer transition-all text-left"
                                                    >
                                                        <div className="font-bold text-indigo-900 text-sm">
                                                            {brandText || 'Unknown Brand'}
                                                        </div>
                                                        <div className="text-xs text-indigo-600 mt-0.5 font-medium">
                                                            Generic: {suggestion.generic_name}
                                                        </div>
                                                        {doseText && (
                                                            <div className="text-[10px] text-slate-500 mt-1 bg-slate-100 inline-block px-1.5 py-0.5 rounded">
                                                                {doseText}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                              </div>

                              <div className="flex flex-row gap-3 w-full lg:w-auto shrink-0">
                                  <div className="flex-1 lg:flex-none lg:w-20">
                                    <label className="text-xs font-semibold text-slate-500 block mb-1 select-none">Dose</label>
                                    <input type="text" value={drug.dose} onChange={(e) => updateDrug(drug.id, 'dose', e.target.value)} className="w-full p-2 lg:p-1 border rounded bg-white" placeholder="mg" />
                                  </div>
                                  
                                  <div className="flex-1 lg:flex-none lg:w-28">
                                    <label className="text-xs font-semibold text-slate-500 block mb-1 select-none">Freq</label>
                                    <select value={drug.freq} onChange={(e) => updateDrug(drug.id, 'freq', e.target.value)} className="w-full p-2 lg:p-1 border rounded bg-white">
                                        <option value="OD">OD (Once Daily)</option>
                                        <option value="BID">BID (2x/Day)</option>
                                        <option value="TID">TID (3x/Day)</option>
                                        <option value="QID">QID (4x/Day)</option>
                                        <option value="Q4H">Q4H</option>
                                        <option value="Q6H">Q6H</option>
                                        <option value="Q8H">Q8H</option>
                                        <option value="Q12H">Q12H</option>
                                        <option value="HS">HS (Bedtime)</option>
                                        <option value="PRN">PRN (As Needed)</option>
                                        <option value="Stat">Stat (Immediate)</option>
                                        <option value="Weekly">Weekly</option>
                                    </select>
                                  </div>
                                  
                                  <div className="flex-1 lg:flex-none lg:w-28">
                                    <label className="text-xs font-semibold text-slate-500 block mb-1 select-none">Route</label>
                                    <select value={drug.route} onChange={(e) => updateDrug(drug.id, 'route', e.target.value)} className="w-full p-2 lg:p-1 border rounded bg-white">
                                        <option value="Oral">Oral</option>
                                        <option value="IV">IV</option>
                                        <option value="IM">IM</option>
                                        <option value="SubQ">SubQ</option>
                                        <option value="Inhaled">Inhaled</option>
                                        <option value="Topical">Topical</option>
                                        <option value="Rectal">Rectal</option>
                                    </select>
                                  </div>
                              </div>
                              
                              <button onClick={() => removeDrug(drug.id)} className="absolute top-2 right-2 lg:static text-slate-400 hover:text-red-600 lg:p-2 lg:mb-0.5 transition-colors bg-white lg:bg-transparent rounded-full shadow-sm lg:shadow-none p-1 select-none" title="Remove Medication Box">
                                  <XCircle className="w-5 h-5"/>
                              </button>
                          </div>
                          
                          <div className="flex flex-wrap gap-3 justify-end px-2 pt-2 border-t border-slate-200/60 mt-1 select-none">
                              <button onClick={() => saveDrugToCloudDB(drug)} className="text-emerald-600 hover:text-emerald-700 px-3 py-1.5 bg-emerald-50 rounded border border-emerald-200 shadow-sm flex items-center justify-center gap-1.5 transition-colors text-xs font-bold w-full sm:w-auto" title="Save to Cloud DB">
                                  <Database className="w-3 h-3"/> Save to DB
                              </button>
                              <button onClick={() => deleteDrugFromCloudDB(drug)} className="text-red-500 hover:text-red-700 px-3 py-1.5 bg-red-50 rounded border border-red-200 shadow-sm flex items-center justify-center gap-1.5 transition-colors text-xs font-bold w-full sm:w-auto" title="Delete from Cloud DB">
                                  <Trash2 className="w-3 h-3"/> Delete from DB
                              </button>
                          </div>
                          
                          <div className="pt-3 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 border-t border-slate-200 w-full overflow-x-auto pb-2 sm:pb-0 select-none">
                              <span className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1 shrink-0"><Calendar className="w-3 h-3"/> Schedule:</span>
                              <div className="flex gap-1.5 overflow-x-auto w-full pb-1 sm:pb-0 shrink-0">
                                  {Array.from({ length: patient.daysAdmitted }, (_, dayIdx) => {
                                      const dayNum = dayIdx + 1;
                                      const isSelected = drug.schedule && drug.schedule[dayNum];
                                      return (
                                          <button 
                                            key={dayNum}
                                            onClick={() => toggleDrugSchedule(drug.id, dayNum)}
                                            className={`min-w-[40px] h-9 shrink-0 rounded border text-xs font-bold transition-all flex flex-col items-center justify-center ${isSelected ? 'bg-indigo-600 text-white border-indigo-700 shadow-sm' : 'bg-white text-slate-400 border-slate-300 hover:bg-slate-50'}`}
                                          >
                                              <span>D{dayNum}</span>
                                              {isSelected && <span className="text-[8px] leading-none">✓</span>}
                                          </button>
                                      );
                                  })}
                              </div>
                          </div>
                        </div>
                      ))}
                      <button onClick={addDrug} className="mt-2 text-indigo-600 font-semibold hover:underline flex items-center gap-1 select-none">
                        + Add Another Medication
                      </button>
                    </div>
                  </QuestionBlock>
                </div>
                
                <div className="col-span-1 md:col-span-2">
                    <QuestionBlock index={4} label="Clinical Disposition" subLabel="Intervention taken and patient status outcome">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-semibold text-slate-500 block mb-1">Intervention Taken by Pharmacist/MD</label>
                                <select name="intervention" value={patient.intervention} onChange={handlePatientChange} className="w-full p-2 border rounded bg-slate-50">
                                    <option>Monitoring Only</option>
                                    <option>Dose Reduced</option>
                                    <option>Drug Discontinued</option>
                                    <option>Alternative Therapy Prescribed</option>
                                    <option>Patient Counseling Provided</option>
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-semibold text-slate-500 block mb-1">Patient Status / Outcome</label>
                                <select name="outcome" value={patient.outcome} onChange={handlePatientChange} className="w-full p-2 border rounded bg-slate-50">
                                    <option>Stable</option>
                                    <option>Recovered</option>
                                    <option>Improved</option>
                                    <option>No Change</option>
                                    <option>Deteriorated</option>
                                    <option>Deceased</option>
                                </select>
                            </div>
                        </div>
                    </QuestionBlock>
                </div>
              </div>

              <div className="flex justify-end gap-3 w-full select-none">
                <button 
                  onClick={runClinicalAnalysis} 
                  disabled={loading}
                  className="bg-indigo-600 text-white px-6 py-3 rounded-lg shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 font-bold disabled:opacity-50 w-full md:w-auto text-base md:text-sm"
                >
                  {loading ? 'Processing Protocol...' : 'Run Clinical Analysis'} <BrainCircuit className="w-5 h-5" />
                </button>
              </div>
            </div>
          );

          const renderAnalysis = () => (
            <div className="max-w-6xl mx-auto space-y-6 transition-all duration-300">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 select-none">
                <div>
                   <h2 className="text-2xl font-bold text-slate-900">Interaction Matrix</h2>
                   <p className="text-slate-500 text-sm">AI-Verified • Guidelines Referenced (ACC, Lexicomp)</p>
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
                   <button onClick={() => openPrintModal()} className="w-full sm:w-auto px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 flex items-center justify-center gap-2 shadow-sm font-bold">
                       <FileText className="w-4 h-4"/> Download PDF Report
                   </button>
                </div>
              </div>

              {interactions.length === 0 && !loading && (
                <div className="text-center p-12 bg-slate-50 rounded-lg border border-dashed border-slate-300 select-none">
                  <Stethoscope className="w-12 h-12 text-slate-300 mx-auto mb-4"/>
                  <h3 className="text-lg font-medium text-slate-600">No Interactions Found or Run Yet</h3>
                  <button onClick={() => setActiveTab('intake')} className="text-indigo-600 underline">Return to Intake to run analysis</button>
                </div>
              )}

              {interactions.map((item, idx) => (
                <div key={idx} className={`bg-white border-l-8 rounded-r-lg shadow-sm p-6 transition-all duration-300 ${item.severity === 'Major' ? 'border-red-500' : item.severity === 'Moderate' ? 'border-orange-500' : 'border-blue-500'}`}>
                  <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-3">
                    <div>
                       <h3 className="text-lg font-bold text-slate-900 mb-1 select-text">{item.pair}</h3>
                       <div className="flex items-center gap-2 select-none">
                         <SeverityBadge level={item.severity} />
                         <span className="text-xs font-semibold text-slate-500 px-2 border-l border-slate-300">{item.interaction_type}</span>
                       </div>
                    </div>
                    <div className="text-right select-none">
                        {item.occurrence && (
                            <div className="mb-1 text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded flex items-center gap-1 justify-end">
                                <Calendar className="w-3 h-3"/> Occurrence: {item.occurrence}
                            </div>
                        )}
                        <span className="text-xs font-bold text-green-600">AI-Verified</span>
                    </div>
                  </div>

                  {/* Streamlined Line-by-Line Content */}
                  <div className="space-y-3 text-sm mb-4 select-text">
                      <div className="flex items-start gap-2">
                          <span className="w-24 shrink-0 font-bold text-slate-500 uppercase text-xs pt-0.5 tracking-wider select-none">Mechanism</span>
                          <span className="text-slate-800 font-medium break-words leading-tight">{item.mechanism_short}</span>
                      </div>
                      <div className="flex items-start gap-2">
                          <span className="w-24 shrink-0 font-bold text-slate-500 uppercase text-xs pt-0.5 tracking-wider select-none">Significance</span>
                          <span className="text-slate-800 font-medium break-words leading-tight">{item.clinical_significance}</span>
                      </div>
                      <div className="flex items-start gap-2">
                          <span className="w-24 shrink-0 font-bold text-slate-500 uppercase text-xs pt-0.5 tracking-wider select-none">Action</span>
                          <span className="text-indigo-800 font-bold break-words leading-tight">{item.recommendation}</span>
                      </div>
                      {item.dose_adjustment && (
                          <div className="flex items-start gap-2 mt-2 bg-indigo-50 p-3 rounded border border-indigo-100">
                              <span className="w-24 shrink-0 font-bold text-indigo-700 uppercase text-xs pt-0.5 tracking-wider flex items-center gap-1 select-none">
                                  <Activity className="w-3 h-3"/> Adj. Dose
                              </span>
                              <span className="text-indigo-900 font-semibold break-words leading-tight">{item.dose_adjustment}</span>
                          </div>
                      )}
                  </div>

                  {/* Render References as Links */}
                  <div className="mt-4 flex flex-wrap gap-3 justify-end text-xs pt-2 border-t border-slate-50 select-none">
                      <span className="text-slate-400 italic self-center">Evidence:</span>
                      {item.references && item.references.map((ref, rIdx) => {
                          const title = typeof ref === 'string' ? ref : ref.title;
                          const url = `https://scholar.google.com/scholar?q=${encodeURIComponent(title)}`;
                          return (
                            <a key={rIdx} href={url} target="_blank" className="flex items-center gap-1 bg-slate-100 hover:bg-indigo-50 text-indigo-600 px-2 py-1 rounded border border-slate-200 transition-colors">
                                {title} <ExternalLink className="w-3 h-3"/>
                            </a>
                          );
                      })}
                  </div>
                  
                  <ClinicalSearchLinks pair={item.pair} />
                </div>
              ))}
            </div>
          );

          const renderDashboard = () => {
            const severityCounts = { Major: 0, Moderate: 0, Minor: 0 };
            interactions.forEach(i => {
              if (severityCounts[i.severity] !== undefined) severityCounts[i.severity]++;
              else if (i.severity === 'Major') severityCounts.Major++;
              else if (i.severity === 'Moderate') severityCounts.Moderate++;
              else severityCounts.Minor++;
            });

            return (
              <div className="max-w-6xl mx-auto transition-all duration-300">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 select-none">
                   <h2 className="text-2xl font-bold text-slate-900">Clinical Analytics</h2>
                   <div className="flex bg-slate-200 p-1 rounded-lg">
                      <button onClick={() => setDashTab('analytics')} className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${dashTab === 'analytics' ? 'bg-white text-indigo-600 shadow' : 'text-slate-500 hover:text-slate-700'}`}>Overview</button>
                      <button onClick={() => setDashTab('ai-agent')} className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors flex items-center gap-1.5 ${dashTab === 'ai-agent' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-700'}`}>
                         <MessageSquare className="w-4 h-4"/> AI Agent
                      </button>
                   </div>
                </div>
                
                {dashTab === 'analytics' && (
                  <div className="animate-fadeIn">
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 mb-8 select-none">
                         <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 transition-all hover:shadow-md">
                           <div className="text-slate-500 text-sm font-medium mb-1">Total Interactions</div>
                           <div className="text-4xl font-bold text-slate-900">{interactions.length}</div>
                           <div className="text-xs text-green-600 mt-2 flex items-center gap-1"><CheckCircle className="w-3 h-3"/> Engine Active</div>
                         </div>
                         <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 transition-all hover:shadow-md">
                           <div className="text-slate-500 text-sm font-medium mb-1">Highest Severity</div>
                           <div className={`text-4xl font-bold ${interactions.some(i => i.severity === 'Major') ? 'text-red-600' : interactions.some(i => i.severity === 'Moderate') ? 'text-orange-500' : 'text-blue-500'}`}>
                              {interactions.some(i => i.severity === 'Major') ? 'Major' : interactions.some(i => i.severity === 'Moderate') ? 'Moderate' : interactions.length > 0 ? 'Monitoring' : 'None'}
                           </div>
                           <div className="text-xs text-red-500 mt-2 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> Assessment Based</div>
                         </div>
                         <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 transition-all hover:shadow-md">
                           <div className="text-slate-500 text-sm font-medium mb-1">Renal Risk Factor</div>
                           <div className="text-4xl font-bold text-indigo-600">{(patient.crcl && patient.crcl < 60) || patient.rft_enabled ? 'High' : 'Low'}</div>
                           <div className="text-xs text-slate-400 mt-2">Based on specific inputs</div>
                         </div>
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 select-none">
                         <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                           <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2"><BarChart2 className="w-5 h-5"/> Interaction Severity Distribution</h3>
                           <div className="space-y-6">
                              {Object.entries(severityCounts).map(([key, count]) => {
                                const max = Math.max(1, interactions.length);
                                const percent = (count / max) * 100;
                                return (
                                  <div key={key}>
                                    <div className="flex justify-between text-sm mb-1">
                                      <span className="font-medium text-slate-700">{key}</span>
                                      <span className="text-slate-500">{count}</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-3">
                                      <div 
                                        className={`h-3 rounded-full transition-all duration-1000`} 
                                        style={{ width: `${percent}%`, backgroundColor: SEVERITY_HEX[key] || '#ccc' }}
                                      ></div>
                                    </div>
                                  </div>
                                )
                              })}
                           </div>
                         </div>

                         <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Activity className="w-5 h-5"/> Organ System Risk Heatmap</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                               <div className={`p-4 rounded border text-center transition-all ${interactions.some(i=>i.mechanism_short && (i.mechanism_short.includes('CYP') || i.mechanism_short.includes('Metabolism'))) ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                                  <div className="text-sm font-bold text-slate-700">Hepatic</div>
                                  <div className="text-xs text-slate-500 mt-1">Metabolism</div>
                               </div>
                               <div className={`p-4 rounded border text-center transition-all ${(patient.crcl && patient.crcl < 50) ? 'bg-orange-50 border-orange-200' : 'bg-green-50 border-green-200'}`}>
                                  <div className="text-sm font-bold text-slate-700">Renal</div>
                                  <div className="text-xs text-slate-500 mt-1">Clearance</div>
                               </div>
                               <div className={`p-4 rounded border text-center transition-all ${interactions.some(i=>i.pair.includes('Warfarin') || i.pair.includes('Aspirin')) ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                                  <div className="text-sm font-bold text-slate-700">Hematologic</div>
                                  <div className="text-xs text-slate-500 mt-1">Bleeding</div>
                               </div>
                               <div className={`p-4 rounded border text-center transition-all ${interactions.some(i=>i.pair.includes('Amiodarone')) ? 'bg-yellow-50 border-yellow-200' : 'bg-slate-50 border-slate-200'}`}>
                                  <div className="text-sm font-bold text-slate-700">Cardiac</div>
                                  <div className="text-xs text-slate-500 mt-1">Rhythm</div>
                               </div>
                            </div>
                         </div>
                      </div>
                  </div>
                )}
                
                {dashTab === 'ai-agent' && (
                  <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col h-[500px] animate-fadeIn">
                     <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50 rounded-t-lg select-none">
                         <div className="flex items-center gap-3">
                             <div className="bg-indigo-100 p-2 rounded-full"><BrainCircuit className="text-indigo-600 w-5 h-5"/></div>
                             <div>
                                 <h3 className="font-bold text-slate-800 leading-none">ClinIQ AI Consultant</h3>
                                 <p className="text-xs text-slate-500 mt-1">Context-aware agent focused on current patient case</p>
                             </div>
                         </div>
                     </div>
                     <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50" ref={chatScrollRef}>
                        {chatHistory.length === 0 && (
                            <div className="text-center mt-10">
                                <MessageSquare className="w-10 h-10 text-indigo-200 mx-auto mb-3"/>
                                <p className="text-slate-500 font-medium">Ask about safer alternatives, detailed mechanisms, or dosage guidance.</p>
                                <div className="mt-4 flex flex-wrap justify-center gap-2 max-w-lg mx-auto select-none">
                                    <button onClick={()=>setChatInput("What are safer alternatives for this regimen?")} className="text-xs bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-full hover:border-indigo-300 hover:text-indigo-600 transition-colors">Find Safer Alternatives</button>
                                    <button onClick={()=>setChatInput("Are there specific lab tests I should monitor today?")} className="text-xs bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-full hover:border-indigo-300 hover:text-indigo-600 transition-colors">Recommend Lab Tests</button>
                                </div>
                            </div>
                        )}
                        {chatHistory.map((msg, i) => (
                            <div key={i} className={`p-3 rounded-lg max-w-[85%] sm:max-w-[75%] text-sm shadow-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white self-end ml-auto' : 'bg-white border border-slate-200 text-slate-800 mr-auto'}`}>
                                {msg.text}
                            </div>
                        ))}
                        {chatLoading && (
                            <div className="p-3 rounded-lg bg-white border border-slate-200 text-slate-500 mr-auto flex items-center gap-2 max-w-xs shadow-sm text-sm">
                                <div className="flex space-x-1">
                                  <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce"></div>
                                  <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: "0.2s"}}></div>
                                  <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: "0.4s"}}></div>
                                </div>
                                <span>Consulting...</span>
                            </div>
                        )}
                     </div>
                     <div className="p-3 border-t border-slate-200 bg-white rounded-b-lg">
                        <div className="flex gap-2 relative">
                            <input 
                                type="text" 
                                value={chatInput} 
                                onChange={e=>setChatInput(e.target.value)} 
                                onKeyDown={e=>e.key==='Enter'&&sendChatMessage()} 
                                disabled={chatLoading}
                                className="flex-1 border border-slate-300 p-2.5 rounded-lg outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm pr-12" 
                                placeholder="Type your clinical question here..." 
                            />
                            <button 
                                onClick={sendChatMessage} 
                                disabled={chatLoading || !chatInput.trim()} 
                                className="absolute right-1.5 top-1.5 bottom-1.5 bg-indigo-600 text-white px-3 rounded-md disabled:opacity-50 hover:bg-indigo-700 transition-colors flex items-center justify-center"
                            >
                                <ChevronRight className="w-5 h-5"/>
                            </button>
                        </div>
                     </div>
                  </div>
                )}
              </div>
            );
          };

          const renderRecords = () => {
              const toggleSelectRecord = (id) => {
                  setSelectedRecordIds(prev => 
                      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                  );
              };

              const toggleSelectAll = () => {
                  if (selectedRecordIds.length === savedRecords.length) {
                      setSelectedRecordIds([]);
                  } else {
                      setSelectedRecordIds(savedRecords.map(r => r.patientId));
                  }
              };

              return (
                  <div className="max-w-6xl mx-auto transition-all duration-300">
                     <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3 select-none">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-900">Patient Records</h2>
                            <p className="text-slate-500 text-sm">Stored locally {supabaseClient ? '& Synced to Cloud' : '(Local Only - Add API Keys for Cloud)'}.</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-sm bg-white border px-3 py-1.5 rounded text-center sm:text-left">
                                Total: <span className="font-bold">{savedRecords.length}</span>
                            </div>
                            <button 
                                onClick={() => openPrintModal(selectedRecordIds)} 
                                disabled={selectedRecordIds.length === 0}
                                className="px-4 py-1.5 bg-slate-800 text-white rounded text-sm font-bold hover:bg-slate-700 transition-colors disabled:opacity-50 flex items-center gap-2 shadow-sm"
                            >
                                <Printer className="w-4 h-4"/> Print Selected ({selectedRecordIds.length})
                            </button>
                        </div>
                     </div>

                     {savedRecords.length === 0 ? (
                          <div className="text-center p-12 bg-white rounded-lg border border-dashed select-none">
                            <Folder className="w-12 h-12 text-slate-300 mx-auto mb-4"/>
                            <p className="text-slate-500">No records saved yet.</p>
                            <button onClick={() => setActiveTab('intake')} className="text-indigo-600 font-bold mt-2">Create New Entry</button>
                          </div>
                     ) : (
                          <div className="bg-white rounded-lg shadow overflow-hidden border">
                              <div className="overflow-x-auto w-full">
                                  <table className="w-full text-sm text-left min-w-[800px]">
                                     <thead className="bg-slate-50 text-slate-700 font-bold border-b select-none">
                                         <tr>
                                             <th className="p-4 w-12 text-center">
                                                 <input 
                                                    type="checkbox" 
                                                    checked={selectedRecordIds.length === savedRecords.length && savedRecords.length > 0} 
                                                    onChange={toggleSelectAll} 
                                                    className="rounded text-indigo-600 cursor-pointer"
                                                 />
                                             </th>
                                             <th className="p-4 whitespace-nowrap text-slate-400">Sr. #</th>
                                             <th className="p-4 whitespace-nowrap">Patient ID</th>
                                             <th className="p-4 whitespace-nowrap">Date</th>
                                             <th className="p-4 whitespace-nowrap">Demographics</th>
                                             <th className="p-4 min-w-[150px]">Condition</th>
                                             <th className="p-4 whitespace-nowrap">Clinical Analysis</th>
                                             <th className="p-4 text-right whitespace-nowrap">Action</th>
                                         </tr>
                                     </thead>
                                     <tbody className="divide-y select-text">
                                         {savedRecords.map((rec, i) => (
                                             <tr key={rec.patientId} className={`hover:bg-slate-50 transition-colors ${selectedRecordIds.includes(rec.patientId) ? 'bg-indigo-50/50' : ''}`}>
                                                 <td className="p-4 text-center">
                                                     <input 
                                                        type="checkbox" 
                                                        checked={selectedRecordIds.includes(rec.patientId)}
                                                        onChange={() => toggleSelectRecord(rec.patientId)}
                                                        className="rounded text-indigo-600 cursor-pointer"
                                                     />
                                                 </td>
                                                 <td className="p-4 font-bold text-slate-400">{i + 1}</td>
                                                 <td className="p-4 font-mono font-bold text-indigo-600 whitespace-nowrap">{rec.patientId}</td>
                                                 <td className="p-4 text-slate-500 whitespace-nowrap">{new Date(rec.timestamp).toLocaleDateString()}</td>
                                                 <td className="p-4 whitespace-nowrap">{rec.demographics?.age || 'N/A'}y / {rec.demographics?.gender || 'N/A'}</td>
                                                 <td className="p-4 text-slate-600">
                                                     <div className="font-bold truncate max-w-[200px]" title={rec.demographics?.primary_diagnosis}>{rec.demographics?.primary_diagnosis || 'N/A'}</div>
                                                     <div className="text-xs truncate max-w-[200px]" title={rec.demographics?.comorbidities}>{rec.demographics?.comorbidities || 'None'}</div>
                                                 </td>
                                                 <td className="p-4">
                                                     <div className="flex flex-col gap-1 items-start whitespace-nowrap select-none">
                                                         <span className={`px-2 py-0.5 rounded text-[10px] uppercase tracking-wider font-bold border ${rec.interactions?.length > 0 ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                             {rec.interactions?.length > 0 ? 'Analysis Done' : 'Pending / Clear'}
                                                         </span>
                                                         <span className="text-xs font-semibold text-slate-600">
                                                             {rec.interactions?.length || 0} Interaction(s)
                                                         </span>
                                                     </div>
                                                 </td>
                                                 <td className="p-4 text-right flex justify-end gap-2 whitespace-nowrap select-none">
                                                     {(!rec.interactions || rec.interactions.length === 0) && (
                                                         <button onClick={() => analyzeRecordFromList(rec)} className="text-emerald-600 hover:text-emerald-800 p-1.5 flex items-center gap-1 font-semibold text-xs border border-emerald-200 rounded px-3 bg-emerald-50 transition-colors" title="Run Analysis">
                                                             <BrainCircuit className="w-3.5 h-3.5"/> Analyze
                                                         </button>
                                                     )}
                                                     <button onClick={() => openPrintModal(rec)} className="text-slate-600 hover:text-slate-900 p-1.5 flex items-center gap-1 font-semibold text-xs border border-slate-200 rounded px-2 bg-white transition-colors" title="View & Print">
                                                         <Printer className="w-3.5 h-3.5"/> View
                                                     </button>
                                                     <button onClick={() => loadRecordForEditing(rec)} className="text-indigo-600 hover:text-indigo-800 p-1.5 flex items-center gap-1 font-semibold text-xs border border-indigo-200 rounded px-2 bg-indigo-50 transition-colors">
                                                         <Edit className="w-3.5 h-3.5"/> Edit
                                                     </button>
                                                     <button onClick={() => deleteRecord(rec.patientId)} className="text-red-500 hover:text-red-700 p-1.5 transition-colors" title="Delete Record">
                                                         <Trash2 className="w-4 h-4"/>
                                                     </button>
                                                 </td>
                                             </tr>
                                         ))}
                                     </tbody>
                                  </table>
                              </div>
                          </div>
                     )}
                  </div>
              );
          };

          const renderDataExport = () => {
              let currentData = exportType === 'spss' ? generateSpssData() : generateNormalData();
              
              // Apply export filtering to view
              if (exportFilter.trim()) {
                  const lowerFilt = exportFilter.toLowerCase();
                  currentData = currentData.filter(row => 
                      Object.values(row).some(v => String(v).toLowerCase().includes(lowerFilt))
                  );
              }

              const allVariablesList = currentData.length > 0 ? Object.keys(currentData[0]) : [];
              const activeVariablesList = allVariablesList.filter(h => visibleColumns[h] !== false);
              
              // SPSS Data Dictionary Definition
              const spssCodebook = [
                  { variable: "Sr_No", measure: "Scale", type: "Numeric", coding: "Sequential record number" },
                  { variable: "Patient_ID", measure: "Nominal", type: "String", coding: "Alphanumeric ID (e.g., PT-123)" },
                  { variable: "Age", measure: "Scale", type: "Numeric", coding: "Continuous integer (Years)" },
                  { variable: "Gender", measure: "Nominal", type: "Numeric", coding: "1 = Male, 2 = Female" },
                  { variable: "Ward_Type", measure: "Nominal", type: "String", coding: "Text: 'General Ward', 'ICU', etc." },
                  { variable: "Length_of_Stay_Days", measure: "Scale", type: "Numeric", coding: "Continuous integer (Days)" },
                  { variable: "Primary_Diagnosis", measure: "Scale", type: "Numeric", coding: "Count of listed primary diagnoses (0, 1, 2...)" },
                  { variable: "Number_of_Comorbidities", measure: "Scale", type: "Numeric", coding: "Count of listed comorbidities (0, 1, 2...)" },
                  { variable: "Renal_Impairment", measure: "Nominal", type: "Numeric", coding: "0 = No (CrCl >= 60), 1 = Yes (CrCl < 60 or monitored)" },
                  { variable: "Hepatic_Impairment", measure: "Nominal", type: "Numeric", coding: "0 = No, 1 = Yes (LFT monitored)" },
                  { variable: "Total_Number_of_Drugs", measure: "Scale", type: "Numeric", coding: "Total unique medications count" },
                  { variable: "Polypharmacy", measure: "Nominal", type: "Numeric", coding: "0 = No (< 5 drugs), 1 = Yes (>= 5 drugs)" },
                  { variable: "Total_DDIs", measure: "Scale", type: "Numeric", coding: "Total interactions detected by AI" },
                  { variable: "Major_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of Major severity DDIs" },
                  { variable: "Moderate_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of Moderate severity DDIs" },
                  { variable: "Minor_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of Minor severity DDIs" },
                  { variable: "Monitoring_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of Monitoring severity DDIs" },
                  { variable: "Pharmacokinetic_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of PK mechanism DDIs" },
                  { variable: "Pharmacodynamic_DDI_Count", measure: "Scale", type: "Numeric", coding: "Count of PD mechanism DDIs" },
                  { variable: "Drug_Disease_Interaction_Count", measure: "Scale", type: "Numeric", coding: "Count of Drug-Disease interactions" },
                  { variable: "AI_Detected_DDIs", measure: "Scale", type: "Numeric", coding: "Total AI detected DDIs (Same as Total_DDIs)" },
                  { variable: "Clinician_Detected_DDIs", measure: "Scale", type: "Numeric", coding: "Placeholder (Default = 0)" },
                  { variable: "Highest_DDI_Severity", measure: "Ordinal", type: "String", coding: "Text: 'Major' > 'Moderate' > 'Minor' > 'Monitoring' > 'None'" },
                  { variable: "Intervention_Required", measure: "Nominal", type: "Numeric", coding: "0 = No (Monitoring Only), 1 = Yes (Dose Reduced, Discontinued, etc.)" },
                  { variable: "Adverse_Drug_Event", measure: "Nominal", type: "Numeric", coding: "Placeholder (Default = 0)" },
                  { variable: "ICU_Transfer", measure: "Nominal", type: "Numeric", coding: "0 = No, 1 = Yes (Ward is ICU)" },
                  { variable: "Mortality", measure: "Nominal", type: "Numeric", coding: "0 = Alive, 1 = Deceased" },
                  { variable: "Final_Outcome", measure: "Nominal", type: "String", coding: "Text: 'Stable', 'Recovered', 'Deceased', etc." }
              ];

              return (
                  <div className="max-w-7xl mx-auto transition-all duration-300">
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 select-none">
                          <div>
                              <h2 className="text-2xl font-bold text-slate-900">Data Export Center</h2>
                              <p className="text-slate-500 text-sm">Compile and download patient records for analysis.</p>
                          </div>
                          <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full md:w-auto">
                              <div className="bg-white border rounded-lg p-1 flex w-full sm:w-auto">
                                  <button 
                                      onClick={() => { setExportType('excel'); setShowCodebook(false); }}
                                      className={`flex-1 sm:flex-none px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${exportType === 'excel' ? 'bg-slate-800 text-white shadow' : 'text-slate-600 hover:bg-slate-100'}`}
                                  >
                                      Excel Format
                                  </button>
                                  <button 
                                      onClick={() => setExportType('spss')}
                                      className={`flex-1 sm:flex-none px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${exportType === 'spss' ? 'bg-slate-800 text-white shadow' : 'text-slate-600 hover:bg-slate-100'}`}
                                  >
                                      SPSS Format
                                  </button>
                              </div>
                              <button onClick={exportCurrentData} className="w-full sm:w-auto px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2 shadow-sm font-bold text-sm">
                                  <Download className="w-4 h-4"/> Download CSV
                              </button>
                          </div>
                      </div>
                      
                      {/* Filter & Customization Toolbar */}
                      <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center select-none">
                          <div className="w-full md:w-1/3 relative">
                              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                  <SearchIcon className="h-4 w-4 text-slate-400" />
                              </div>
                              <input
                                  type="text"
                                  value={exportFilter}
                                  onChange={(e) => setExportFilter(e.target.value)}
                                  className="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md leading-5 bg-white placeholder-slate-500 focus:outline-none focus:placeholder-slate-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm transition-colors"
                                  placeholder="Search all columns (e.g., 'Major', 'Male')"
                              />
                          </div>
                          
                          <div className="w-full md:w-auto flex flex-wrap gap-2 md:ml-auto">
                             <button onClick={() => setShowColSettings(!showColSettings)} className={`px-4 py-2 text-sm font-semibold rounded border transition-colors flex items-center gap-2 ${showColSettings ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'}`}>
                                 <Table className="w-4 h-4"/> Customize Columns
                             </button>
                          </div>
                      </div>

                      {/* Column Settings Panel */}
                      {showColSettings && (
                          <div className="bg-white rounded-lg shadow-sm border border-slate-200 mb-6 p-4 animate-fadeIn select-none">
                              <h3 className="text-sm font-bold text-slate-800 mb-3">Select Columns to Export</h3>
                              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                                  {allVariablesList.map((col, idx) => (
                                      <label key={idx} className="flex items-center gap-2 text-xs text-slate-700 cursor-pointer p-1.5 hover:bg-slate-50 rounded transition-colors">
                                          <input 
                                              type="checkbox" 
                                              checked={visibleColumns[col] !== false} 
                                              onChange={() => setVisibleColumns(prev => ({...prev, [col]: prev[col] === false ? true : false}))}
                                              className="rounded text-indigo-600 focus:ring-indigo-500"
                                          />
                                          <span className="truncate">{col.replace(/_/g, ' ')}</span>
                                      </label>
                                  ))}
                              </div>
                              <div className="mt-4 pt-3 border-t border-slate-100 flex gap-2">
                                  <button onClick={() => {
                                      const allOn = {};
                                      allVariablesList.forEach(k => allOn[k] = true);
                                      setVisibleColumns(allOn);
                                  }} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">Select All</button>
                                  <span className="text-slate-300">|</span>
                                  <button onClick={() => {
                                      const allOff = {};
                                      allVariablesList.forEach(k => allOff[k] = false);
                                      setVisibleColumns(allOff);
                                  }} className="text-xs font-semibold text-slate-500 hover:text-slate-700 transition-colors">Deselect All</button>
                              </div>
                          </div>
                      )}

                      {/* SPSS Codebook Toggle Section */}
                      {exportType === 'spss' && (
                          <div className="mb-6 bg-indigo-50 border border-indigo-200 rounded-lg p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 select-none">
                              <div>
                                  <h3 className="text-sm font-bold text-indigo-900 flex items-center gap-2">
                                      <Database className="w-4 h-4"/> SPSS Data Dictionary / Codebook
                                  </h3>
                                  <p className="text-xs text-indigo-700 mt-1">View the variable encoding reference for statistical software imports.</p>
                              </div>
                              <button 
                                  onClick={() => setShowCodebook(!showCodebook)}
                                  className="w-full sm:w-auto px-4 py-2 bg-white text-indigo-700 border border-indigo-200 rounded shadow-sm text-xs font-bold hover:bg-indigo-100 transition-colors"
                              >
                                  {showCodebook ? "Hide Codebook" : "View Codebook"}
                              </button>
                          </div>
                      )}

                      {/* Render SPSS Codebook Table */}
                      {exportType === 'spss' && showCodebook && (
                          <div className="bg-white rounded-lg shadow-sm border border-slate-200 mb-6 overflow-hidden animate-fadeIn">
                              <div className="overflow-x-auto w-full">
                                  <table className="w-full text-xs text-left min-w-[600px]">
                                      <thead className="bg-indigo-100 text-indigo-900 font-bold border-b border-indigo-200 select-none">
                                          <tr>
                                              <th className="p-3 border-r border-indigo-200">SPSS Variable Name</th>
                                              <th className="p-3 border-r border-indigo-200">Measure Type</th>
                                              <th className="p-3 border-r border-indigo-200">Data Type</th>
                                              <th className="p-3">Value Labels / Coding Details</th>
                                          </tr>
                                      </thead>
                                      <tbody className="divide-y divide-slate-100 select-text">
                                          {spssCodebook.map((row, i) => (
                                              <tr key={i} className="hover:bg-slate-50">
                                                  <td className="p-3 border-r font-mono text-indigo-700 font-semibold">{row.variable}</td>
                                                  <td className="p-3 border-r text-slate-600 font-medium">{row.measure}</td>
                                                  <td className="p-3 border-r text-slate-600">{row.type}</td>
                                                  <td className="p-3 text-slate-800">{row.coding}</td>
                                              </tr>
                                          ))}
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                      )}

                      {/* Data Preview Table */}
                      {currentData.length === 0 ? (
                          <div className="text-center p-12 bg-white rounded-lg border border-dashed select-none">
                              <Table className="w-12 h-12 text-slate-300 mx-auto mb-4"/>
                              <p className="text-slate-500">No records match the current filter or visibility settings.</p>
                          </div>
                      ) : (
                          <div className="bg-white rounded-lg shadow overflow-hidden border">
                              <div className="p-3 bg-slate-50 border-b border-slate-200 text-xs text-slate-500 font-semibold flex justify-between select-none">
                                  <span>Showing {currentData.length} records</span>
                                  <span>{activeVariablesList.length} columns selected</span>
                              </div>
                              <div className="overflow-x-auto w-full">
                                  <table className="w-full text-xs text-left whitespace-nowrap min-w-[800px]">
                                      <thead className="bg-slate-50 text-slate-700 font-bold border-b select-none">
                                          <tr>
                                              {activeVariablesList.map((key, idx) => (
                                                  <th key={idx} className="p-3 border-r">{key}</th>
                                              ))}
                                          </tr>
                                      </thead>
                                      <tbody className="divide-y select-text">
                                          {currentData.map((row, i) => (
                                              <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                  {activeVariablesList.map((key, j) => (
                                                      <td key={j} className="p-3 border-r">{row[key] === null || row[key] === undefined ? '' : String(row[key])}</td>
                                                  ))}
                                              </tr>
                                          ))}
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                      )}
                  </div>
              );
          };

          if (!isAuthenticated) {
            return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
          }

          return (
            <>
              {/* --- MAIN APP INTERFACE (HIDDEN ON PRINT) --- */}
              <div className="h-screen bg-slate-100 font-sans text-slate-900 flex overflow-hidden print:hidden w-full">
                {/* Settings Modal */}
                {showSettings && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 app-interface">
                        <div className="bg-white rounded-lg p-6 w-full max-w-md shadow-2xl transition-all duration-300">
                            <h3 className="text-xl font-bold text-slate-800 mb-4 select-none">System Configuration</h3>
                            <div className="mb-4">
                                <label className="block text-sm font-semibold text-slate-600 mb-2 select-none">Google Gemini API Key</label>
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-3 mb-4 text-xs text-blue-800 rounded-r select-none">
                                    <strong>Note:</strong> The AI is built-in automatically <em>only</em> when using this app inside the Gemini Web Canvas. 
                                    If you download this HTML file to your computer or website, you <strong>must</strong> generate a free API key from Google AI Studio and paste it below to enable AI features.
                                </div>
                                <input 
                                    type="password" 
                                    value={geminiKey} 
                                    onChange={(e) => setGeminiKey(e.target.value)}
                                    className="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm transition-colors"
                                    placeholder="Enter manual API key (AIzaSy...)"
                                />
                            </div>
                            <div className="flex justify-end gap-2 mt-6 select-none">
                                <button onClick={saveSettings} className="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-bold transition-colors shadow-sm w-full sm:w-auto">Save & Close</button>
                            </div>
                        </div>
                    </div>
                )}
                
                {/* Mobile Topbar */}
                <div className="md:hidden fixed top-0 left-0 right-0 h-16 bg-slate-900 text-white flex items-center justify-between px-4 z-40 shadow-md select-none">
                    <div className="flex items-center gap-2">
                        <Activity className="text-indigo-400 w-6 h-6"/>
                        <span className="font-bold text-lg tracking-tight">ClinIQ <span className="text-[10px] bg-indigo-600 px-1 rounded align-middle">PRO</span></span>
                    </div>
                    <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 hover:bg-slate-800 rounded transition-colors">
                        <Menu className="w-6 h-6"/>
                    </button>
                </div>

                {/* Mobile Sidebar Backdrop */}
                {isMobileMenuOpen && (
                    <div className="md:hidden fixed inset-0 bg-black/60 z-40 transition-opacity" onClick={() => setIsMobileMenuOpen(false)} />
                )}

                {/* Sidebar */}
                <div className={`
                    fixed inset-y-0 left-0 z-50 h-full flex flex-col bg-slate-900 text-white transition-all duration-300 ease-in-out shadow-2xl md:shadow-none select-none
                    w-64 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} 
                    md:relative md:translate-x-0 ${isSidebarOpen ? 'md:w-64' : 'md:w-20'} shrink-0
                `}>
                  <div className="p-6 border-b border-slate-800 flex justify-between items-center relative">
                    {isSidebarOpen ? (
                        <div className="overflow-hidden whitespace-nowrap">
                          <h1 className="text-xl font-bold tracking-tight flex items-center gap-2">
                              <Activity className="text-indigo-400 min-w-[20px]"/> ClinIQ <span className="text-xs bg-indigo-600 px-1 rounded">PRO</span>
                          </h1>
                          <p className="text-xs text-slate-400 mt-1">Clinical Intelligence Platform</p>
                        </div>
                    ) : (
                        <div className="w-full flex justify-center hidden md:flex">
                            <Activity className="text-indigo-400 w-8 h-8"/>
                        </div>
                    )}
                    
                    <button onClick={() => setIsMobileMenuOpen(false)} className="md:hidden text-slate-400 hover:text-white p-1 absolute top-5 right-4">
                        <X className="w-6 h-6"/>
                    </button>
                    
                    <button 
                      onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                      className="hidden md:block absolute -right-3 top-8 bg-indigo-600 rounded-full p-1 text-white border border-slate-900 shadow-sm z-50 hover:bg-indigo-500 transition-colors"
                    >
                      {isSidebarOpen ? <ChevronLeft className="w-4 h-4"/> : <ChevronRight className="w-4 h-4"/>} 
                    </button>
                  </div>
                  
                  <div className="px-4 mt-4">
                      <button 
                          onClick={() => { resetPatient(); setIsMobileMenuOpen(false); }} 
                          className={`bg-indigo-800 hover:bg-indigo-700 text-indigo-100 rounded flex items-center justify-center border border-indigo-700 transition-all ${isSidebarOpen ? 'w-full py-3 md:py-2 gap-2 text-sm font-semibold' : 'w-10 h-10 p-0 rounded-full mx-auto hidden md:flex'}`}
                          title="New Patient Case"
                      >
                          <Plus className="w-4 h-4"/> <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>New Patient Case</span>
                      </button>
                  </div>

                  <nav className="flex-grow p-4 space-y-2 overflow-y-auto">
                    <button onClick={() => { setActiveTab('intake'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center ${isSidebarOpen ? 'gap-3 px-4' : 'justify-center px-2'} py-3 rounded-lg text-sm transition-all ${activeTab === 'intake' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'}`} title="Patient Intake">
                      <FileText className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0"/> 
                      <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Patient Intake</span>
                    </button>
                    <button onClick={() => { setActiveTab('analysis'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center ${isSidebarOpen ? 'gap-3 px-4' : 'justify-center px-2'} py-3 rounded-lg text-sm transition-all ${activeTab === 'analysis' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'}`} title="Interaction Report">
                      <AlertTriangle className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0"/> 
                      <div className={`flex justify-between w-full items-center ${!isSidebarOpen ? 'hidden md:hidden' : 'flex'}`}>
                          <span>Interaction Report</span>
                          {interactions.length > 0 && <span className="bg-red-500 text-white text-xs px-1.5 rounded-full">{interactions.length}</span>}
                      </div>
                    </button>
                    <button onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center ${isSidebarOpen ? 'gap-3 px-4' : 'justify-center px-2'} py-3 rounded-lg text-sm transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'}`} title="Clinical Analytics">
                      <BarChart2 className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0"/> 
                      <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Clinical Analytics</span>
                    </button>
                    <button onClick={() => { setActiveTab('records'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center ${isSidebarOpen ? 'gap-3 px-4' : 'justify-center px-2'} py-3 rounded-lg text-sm transition-all ${activeTab === 'records' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'}`} title="Patient Records">
                      <Folder className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0"/> 
                      <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Patient Records</span>
                    </button>
                    <button onClick={() => { setActiveTab('export'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center ${isSidebarOpen ? 'gap-3 px-4' : 'justify-center px-2'} py-3 rounded-lg text-sm transition-all ${activeTab === 'export' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'}`} title="Data Export Center">
                      <Table className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0"/> 
                      <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Data Export Center</span>
                    </button>
                  </nav>

                  <div className="p-4 border-t border-slate-800 shrink-0">
                      <button onClick={saveToServer} className={`bg-indigo-700 hover:bg-indigo-600 text-white rounded-lg text-sm font-bold flex items-center justify-center mb-4 transition-all ${isSidebarOpen ? 'w-full px-4 py-3 md:py-2 gap-2' : 'w-10 h-10 p-0 mx-auto rounded-full hidden md:flex'}`} title="Save Patient Record">
                          <Save className="w-5 h-5 md:w-4 md:h-4 flex-shrink-0" /> <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Save Record</span>
                      </button>
                      
                      <button onClick={() => { setShowSettings(true); setIsMobileMenuOpen(false); }} className={`text-slate-400 hover:text-white flex items-center justify-center text-sm md:text-xs mb-4 transition-all py-2 md:py-0 ${isSidebarOpen ? 'w-full gap-2' : 'w-full justify-center hidden md:flex'}`} title="System Settings">
                          <Settings className="w-5 h-5 md:w-3 md:h-3"/> <span className={`${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>Settings</span>
                      </button>

                    <div className={`flex items-center ${isSidebarOpen ? 'gap-3' : 'justify-center hidden md:flex'}`}>
                        <div className="w-10 h-10 md:w-8 md:h-8 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
                          <User className="w-5 h-5 md:w-4 md:h-4 text-slate-300"/>
                        </div>
                        <div className={`overflow-hidden ${!isSidebarOpen ? 'hidden md:hidden' : 'block'}`}>
                          <div className="text-sm font-medium truncate">Dr. Roberts</div>
                          <div className="text-xs text-slate-500 truncate">Chief Pharmacist</div>
                        </div>
                     </div>
                  </div>
                </div>

                {/* Main View Area */}
                <div className="flex-1 min-w-0 h-full overflow-y-auto pt-20 md:pt-8 p-4 lg:p-8 relative transition-all duration-300">
                  <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8 gap-4 no-print select-none">
                     <div>
                       <h2 className="text-2xl md:text-3xl font-bold text-slate-800 capitalize">{activeTab.replace('-', ' ')}</h2>
                       <p className="text-slate-500 text-sm">Session ID: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                     </div>
                     <div className="flex flex-wrap sm:flex-nowrap gap-2 w-full sm:w-auto">
                        <div className="px-3 py-1.5 md:py-1 bg-white border rounded-full text-xs font-medium text-slate-600 flex items-center justify-center gap-2 flex-grow sm:flex-grow-0">
                           <span className={`w-2 h-2 rounded-full bg-green-500`}></span> {geminiKey ? 'AI Online (Key)' : 'AI Online'}
                        </div>
                        <div className="px-3 py-1.5 md:py-1 bg-white border rounded-full text-xs font-medium text-slate-600 flex items-center justify-center gap-2 flex-grow sm:flex-grow-0">
                           <span className={`w-2 h-2 rounded-full ${supabaseClient ? 'bg-green-500' : 'bg-red-500'}`}></span> {supabaseClient ? 'Cloud Sync On' : 'Local Only'}
                        </div>
                     </div>
                  </header>

                  {activeTab === 'intake' && renderIntake()}
                  {activeTab === 'analysis' && renderAnalysis()}
                  {activeTab === 'dashboard' && renderDashboard()}
                  {activeTab === 'records' && renderRecords()}
                  {activeTab === 'export' && renderDataExport()}
                  
                  {/* Global Notification Toast */}
                  {notification && <Toast message={notification.message} type={notification.type} />}
                </div>
              </div>
              
              {/* --- ON-SCREEN PRINT PREVIEW MODAL (HIDDEN ON PRINT) --- */}
              {printData && (
                  <div className="fixed inset-0 bg-slate-900/90 z-50 flex flex-col overflow-hidden app-interface print:hidden animate-fadeIn">
                      <div className="flex justify-between items-center p-4 bg-white/10 backdrop-blur-sm border-b border-white/10 text-white select-none">
                          <h2 className="text-xl font-bold flex items-center gap-2"><Printer className="w-5 h-5"/> Print Preview</h2>
                          <div className="flex gap-3">
                              <button onClick={() => window.print()} className="bg-white text-indigo-900 px-4 py-2 rounded font-bold shadow hover:bg-indigo-50 flex items-center gap-2 transition-colors">
                                  <Printer className="w-4 h-4"/> Print / Save PDF
                              </button>
                              <button onClick={() => setPrintData(null)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded transition-colors">
                                  <X className="w-5 h-5"/>
                              </button>
                          </div>
                      </div>
                      <div className="flex-grow overflow-auto p-8 flex justify-center bg-slate-800">
                          <div className="bg-white shadow-2xl w-full max-w-[21cm] min-h-[29.7cm] relative">
                              <PrintableReportContent records={printData} />
                          </div>
                      </div>
                  </div>
              )}

              {/* --- THE ACTUAL PRINT DOCUMENT (HIDDEN ON SCREEN, VISIBLE TO PRINTER) --- */}
              {printData && (
                  <div className="hidden print:block w-full bg-white">
                      <PrintableReportContent records={printData} />
                  </div>
              )}

              {/* Secondary Medication Delete Modal */}
              {deleteModalState.isOpen && (
                  <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4 modal-backdrop print:hidden animate-fadeIn">
                      <div className="bg-white rounded-lg shadow-2xl max-w-md w-full p-6 transition-all duration-300">
                          <h3 className="text-lg font-bold text-slate-900 mb-2 select-none flex items-center gap-2">
                              <Trash2 className="w-5 h-5 text-red-500" /> Select Dosage Form to Delete
                          </h3>
                          <p className="text-slate-600 mb-4 text-sm select-none">
                              Found the following entries for <strong>{deleteModalState.drugData?.brand || deleteModalState.drugData?.name}</strong>. Please select the specific one to remove from the cloud database.
                          </p>

                          {deleteModalState.isLoading ? (
                              <div className="flex justify-center p-6">
                                  <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                              </div>
                          ) : deleteModalState.fetchedForms.length > 0 ? (
                              <div className="max-h-60 overflow-y-auto mb-6 border border-slate-200 rounded-lg divide-y select-none">
                                  {deleteModalState.fetchedForms.map(form => (
                                      <label key={form.id} className={`flex items-start gap-3 p-3 cursor-pointer hover:bg-slate-50 transition-colors ${deleteModalState.selectedFormId === form.id ? 'bg-red-50' : ''}`}>
                                          <input 
                                              type="radio" 
                                              name="deleteFormSelection" 
                                              className="mt-0.5 w-4 h-4 text-red-600 focus:ring-red-500"
                                              checked={deleteModalState.selectedFormId === form.id}
                                              onChange={() => setDeleteModalState(prev => ({ ...prev, selectedFormId: form.id }))}
                                          />
                                          <div>
                                              <div className="font-bold text-slate-800 text-sm">{form.brand_name}</div>
                                              <div className="text-xs text-slate-500 mt-0.5">Strength: {form.strength || 'N/A'} • Route: {form.dosage_form || 'N/A'}</div>
                                          </div>
                                      </label>
                                  ))}
                              </div>
                          ) : (
                              <div className="p-4 text-center text-slate-500 text-sm border rounded-lg mb-6 bg-slate-50">
                                  No specific forms found to delete.
                              </div>
                          )}

                          <div className="flex justify-end gap-3 select-none">
                              <button 
                                  onClick={() => setDeleteModalState(prev => ({ ...prev, isOpen: false }))}
                                  className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded text-sm font-medium transition-colors"
                                  disabled={deleteModalState.isLoading}
                              >
                                  Cancel
                              </button>
                              <button 
                                  onClick={executeDrugDeletion}
                                  disabled={!deleteModalState.selectedFormId || deleteModalState.isLoading}
                                  className="px-4 py-2 text-white bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:hover:bg-red-600 rounded text-sm font-medium transition-colors shadow-sm"
                              >
                                  Delete Selected
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {/* Confirmation Modal */}
              <div className="print:hidden">
                  <ConfirmationModal 
                    isOpen={confirmModal.isOpen}
                    title={confirmModal.title}
                    message={confirmModal.message}
                    onConfirm={confirmModal.onConfirm}
                    onCancel={() => setConfirmModal({ ...confirmModal, isOpen: false })}
                    confirmText={confirmModal.confirmText}
                    isDangerous={confirmModal.isDangerous}
                  />
              </div>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClinIQPlatform />);
    </script>
</body>
</html>
